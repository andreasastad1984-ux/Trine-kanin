name: Build APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Create project
        run: |
          mkdir -p app/src/main/java/com/trine/kanin
          mkdir -p app/src/main/res/values

          echo "android.useAndroidX=true" > gradle.properties

          cat <<EOF > settings.gradle
          pluginManagement {
            repositories {
              google()
              mavenCentral()
              gradlePluginPortal()
            }
          }
          dependencyResolutionManagement {
            repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
            repositories {
              google()
              mavenCentral()
            }
          }
          rootProject.name="app"
          include(":app")
          EOF

          cat <<EOF > build.gradle
          plugins {
            id 'com.android.application' version '8.2.2' apply false
          }
          EOF

          cat <<EOF > app/build.gradle
          plugins {
            id 'com.android.application'
          }

          android {
            namespace "com.trine.kanin"
            compileSdk 34

            defaultConfig {
              applicationId "com.trine.kanin"
              minSdk 24
              targetSdk 34
              versionCode 5
              versionName "5.0"
            }

            buildTypes {
              release {
                minifyEnabled false
              }
            }

            compileOptions {
              sourceCompatibility JavaVersion.VERSION_17
              targetCompatibility JavaVersion.VERSION_17
            }
          }
          EOF

          cat <<EOF > app/src/main/AndroidManifest.xml
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <application
                  android:label="Trines kaninguide"
                  android:theme="@android:style/Theme.Material.Light.NoActionBar">
                  <activity
                      android:name=".MainActivity"
                      android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

          cat <<EOF > app/src/main/res/values/strings.xml
          <resources>
              <string name="app_name">Trines kaninguide</string>
          </resources>
          EOF

          cat <<EOF > app/src/main/java/com/trine/kanin/MainActivity.java
          package com.trine.kanin;

          import android.app.Activity;
          import android.content.SharedPreferences;
          import android.graphics.Color;
          import android.graphics.Typeface;
          import android.graphics.drawable.GradientDrawable;
          import android.os.Bundle;
          import android.text.Editable;
          import android.text.TextWatcher;
          import android.util.TypedValue;
          import android.view.Gravity;
          import android.view.View;
          import android.view.ViewGroup;
          import android.widget.Button;
          import android.widget.EditText;
          import android.widget.LinearLayout;
          import android.widget.ScrollView;
          import android.widget.TextView;

          import java.util.ArrayList;
          import java.util.List;
          import java.util.Locale;

          public class MainActivity extends Activity {

              private LinearLayout contentLayout;
              private final List<RabbitBreed> breeds = new ArrayList<>();
              private String currentQuery = "";
              private String currentSizeFilter = "Alle";
              private SharedPreferences prefs;

              private final int BG = Color.parseColor("#FFF9F5");
              private final int CARD = Color.parseColor("#FFFFFF");
              private final int TITLE = Color.parseColor("#2F2A2A");
              private final int TEXT = Color.parseColor("#5B5451");
              private final int PINK = Color.parseColor("#F9DDE3");
              private final int PEACH = Color.parseColor("#FDE8D7");
              private final int SAGE = Color.parseColor("#E4F0E8");
              private final int SAND = Color.parseColor("#F3ECE3");
              private final int LAV = Color.parseColor("#EEE7F8");
              private final int ACCENT = Color.parseColor("#B96E7B");

              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);

                  prefs = getSharedPreferences("kaninguide", MODE_PRIVATE);
                  seedData();

                  ScrollView scrollView = new ScrollView(this);
                  scrollView.setBackgroundColor(BG);

                  LinearLayout root = new LinearLayout(this);
                  root.setOrientation(LinearLayout.VERTICAL);
                  root.setPadding(dp(16), dp(16), dp(16), dp(28));

                  LinearLayout hero = new LinearLayout(this);
                  hero.setOrientation(LinearLayout.VERTICAL);
                  hero.setPadding(dp(18), dp(18), dp(18), dp(18));
                  hero.setBackground(makeRounded(CARD, 28));

                  TextView title = new TextView(this);
                  title.setText("Trines kaninguide 🐰");
                  title.setTextSize(TypedValue.COMPLEX_UNIT_SP, 30);
                  title.setTypeface(Typeface.DEFAULT_BOLD);
                  title.setTextColor(TITLE);
                  hero.addView(title);

                  TextView subtitle = new TextView(this);
                  subtitle.setText("Koselig oversikt over raser, farger, temperament, reproduksjon og stell.");
                  subtitle.setTextSize(TypedValue.COMPLEX_UNIT_SP, 16);
                  subtitle.setTextColor(TEXT);
                  subtitle.setPadding(0, dp(8), 0, 0);
                  hero.addView(subtitle);

                  root.addView(hero, matchWrap(dp(12)));

                  EditText search = new EditText(this);
                  search.setHint("Søk etter rase, farge, temperament...");
                  search.setSingleLine(true);
                  search.setTextSize(TypedValue.COMPLEX_UNIT_SP, 16);
                  search.setPadding(dp(16), dp(14), dp(16), dp(14));
                  search.setBackground(makeRounded(Color.WHITE, 22));
                  root.addView(search, matchWrap(dp(12)));

                  LinearLayout filterRow = new LinearLayout(this);
                  filterRow.setOrientation(LinearLayout.HORIZONTAL);
                  root.addView(filterRow, matchWrap(dp(12)));

                  String[] filters = new String[]{"Alle", "Liten", "Mellomstor", "Stor"};
                  for (String filter : filters) {
                      Button btn = new Button(this);
                      btn.setText(filter);
                      btn.setAllCaps(false);
                      styleFilterButton(btn, filter.equals(currentSizeFilter));
                      LinearLayout.LayoutParams lp = new LinearLayout.LayoutParams(
                              0, ViewGroup.LayoutParams.WRAP_CONTENT, 1f
                      );
                      lp.rightMargin = dp(6);
                      btn.setLayoutParams(lp);
                      btn.setOnClickListener(v -> {
                          currentSizeFilter = filter;
                          updateFilterButtons(filterRow);
                          render();
                      });
                      filterRow.addView(btn);
                  }

                  contentLayout = new LinearLayout(this);
                  contentLayout.setOrientation(LinearLayout.VERTICAL);
                  root.addView(contentLayout);

                  scrollView.addView(root);
                  setContentView(scrollView);

                  render();

                  search.addTextChangedListener(new TextWatcher() {
                      @Override public void beforeTextChanged(CharSequence s, int start, int count, int after) {}
                      @Override public void afterTextChanged(Editable s) {}
                      @Override
                      public void onTextChanged(CharSequence s, int start, int before, int count) {
                          currentQuery = s.toString();
                          render();
                      }
                  });
              }

              private void render() {
                  contentLayout.removeAllViews();

                  addInfoBox(
                          "Farger og avl – enkelt forklart",
                          new String[]{
                                  "Blå + blå gir ofte blå unger.",
                                  "Hvit rødøyd kan skjule andre farger.",
                                  "Viltgrå kan gi flere variasjoner.",
                                  "Like foreldre kan fortsatt gi ulike farger hvis de bærer skjulte gener."
                          },
                          PEACH
                  );

                  List<RabbitBreed> favorites = new ArrayList<>();
                  List<RabbitBreed> normal = new ArrayList<>();

                  String q = currentQuery == null ? "" : currentQuery.trim().toLowerCase(Locale.ROOT);

                  for (RabbitBreed breed : breeds) {
                      boolean sizeOk = currentSizeFilter.equals("Alle") || breed.size.equalsIgnoreCase(currentSizeFilter);
                      boolean queryOk = q.isEmpty() || breed.searchText().contains(q);

                      if (sizeOk && queryOk) {
                          if (isFavorite(breed.name)) favorites.add(breed);
                          else normal.add(breed);
                      }
                  }

                  if (!favorites.isEmpty()) {
                      addMiniHeadline("Favoritter ⭐");
                      for (RabbitBreed breed : favorites) {
                          contentLayout.addView(createBreedCard(breed, true));
                      }
                  }

                  if (!normal.isEmpty()) {
                      addMiniHeadline("Raser");
                      for (RabbitBreed breed : normal) {
                          contentLayout.addView(createBreedCard(breed, false));
                      }
                  }

                  if (favorites.isEmpty() && normal.isEmpty()) {
                      LinearLayout empty = new LinearLayout(this);
                      empty.setOrientation(LinearLayout.VERTICAL);
                      empty.setPadding(dp(18), dp(18), dp(18), dp(18));
                      empty.setBackground(makeRounded(CARD, 24));

                      TextView tv = new TextView(this);
                      tv.setText("Ingen treff på søket ditt.");
                      tv.setTextSize(TypedValue.COMPLEX_UNIT_SP, 20);
                      tv.setTypeface(Typeface.DEFAULT_BOLD);
                      tv.setTextColor(TITLE);
                      empty.addView(tv);

                      TextView hint = new TextView(this);
                      hint.setText("Prøv ord som rolig, hvit, stor, pels eller familiekanin.");
                      hint.setTextSize(TypedValue.COMPLEX_UNIT_SP, 15);
                      hint.setTextColor(TEXT);
                      hint.setPadding(0, dp(8), 0, 0);
                      empty.addView(hint);

                      contentLayout.addView(empty, matchWrap(dp(12)));
                  }
              }

              private void addMiniHeadline(String text) {
                  TextView tv = new TextView(this);
                  tv.setText(text);
                  tv.setTextSize(TypedValue.COMPLEX_UNIT_SP, 20);
                  tv.setTypeface(Typeface.DEFAULT_BOLD);
                  tv.setTextColor(TITLE);
                  tv.setPadding(dp(4), dp(8), dp(4), dp(8));
                  contentLayout.addView(tv);
              }

              private void addInfoBox(String heading, String[] lines, int bgColor) {
                  LinearLayout box = new LinearLayout(this);
                  box.setOrientation(LinearLayout.VERTICAL);
                  box.setBackground(makeRounded(bgColor, 24));
                  box.setPadding(dp(16), dp(16), dp(16), dp(16));

                  TextView title = new TextView(this);
                  title.setText(heading);
                  title.setTextSize(TypedValue.COMPLEX_UNIT_SP, 21);
                  title.setTypeface(Typeface.DEFAULT_BOLD);
                  title.setTextColor(TITLE);
                  box.addView(title);

                  for (String line : lines) {
                      TextView tv = new TextView(this);
                      tv.setText("• " + line);
                      tv.setTextSize(TypedValue.COMPLEX_UNIT_SP, 16);
                      tv.setTextColor(TEXT);
                      tv.setPadding(0, dp(8), 0, 0);
                      box.addView(tv);
                  }

                  contentLayout.addView(box, matchWrap(dp(14)));
              }

              private LinearLayout createBreedCard(RabbitBreed breed, boolean favorite) {
                  LinearLayout card = new LinearLayout(this);
                  card.setOrientation(LinearLayout.VERTICAL);
                  card.setPadding(dp(18), dp(18), dp(18), dp(18));
                  card.setBackground(makeRounded(CARD, 26));

                  LinearLayout top = new LinearLayout(this);
                  top.setOrientation(LinearLayout.HORIZONTAL);

                  LinearLayout left = new LinearLayout(this);
                  left.setOrientation(LinearLayout.VERTICAL);
                  LinearLayout.LayoutParams leftLp = new LinearLayout.LayoutParams(0, ViewGroup.LayoutParams.WRAP_CONTENT, 1f);
                  left.setLayoutParams(leftLp);

                  TextView title = new TextView(this);
                  title.setText(breed.name);
                  title.setTextSize(TypedValue.COMPLEX_UNIT_SP, 26);
                  title.setTypeface(Typeface.DEFAULT_BOLD);
                  title.setTextColor(TITLE);
                  left.addView(title);

                  TextView meta = new TextView(this);
                  meta.setText(breed.size + " • " + breed.weight);
                  meta.setTextSize(TypedValue.COMPLEX_UNIT_SP, 15);
                  meta.setTextColor(TEXT);
                  meta.setPadding(0, dp(6), 0, dp(8));
                  left.addView(meta);

                  LinearLayout badges = new LinearLayout(this);
                  badges.setOrientation(LinearLayout.HORIZONTAL);
                  badges.setGravity(Gravity.START);
                  badges.addView(makeBadge(breed.size, LAV));
                  badges.addView(makeBadge(breed.tag, favorite ? PINK : SAGE));
                  left.addView(badges);

                  top.addView(left);

                  Button fav = new Button(this);
                  fav.setAllCaps(false);
                  fav.setText(favorite ? "★" : "☆");
                  fav.setTextSize(TypedValue.COMPLEX_UNIT_SP, 18);
                  fav.setBackground(makeRounded(Color.parseColor("#FFF0B8"), 18));
                  fav.setTextColor(Color.parseColor("#8A5B00"));
                  fav.setOnClickListener(v -> {
                      toggleFavorite(breed.name);
                      render();
                  });
                  top.addView(fav);

                  card.addView(top);

                  addLabelValue(card, "Temperament", breed.temperament);
                  addLabelValue(card, "Vanlige farger", breed.colors);
                  addLabelValue(card, "Reproduksjon", breed.reproduction);

                  addBox(card, "Fordeler", breed.pros, SAGE);
                  addBox(card, "Ulemper", breed.cons, Color.parseColor("#FBE8EA"));
                  addBox(card, "Hva rasen krever", breed.needs, SAND);

                  return card;
              }

              private View makeBadge(String text, int bg) {
                  TextView tv = new TextView(this);
                  tv.setText(text);
                  tv.setTextSize(TypedValue.COMPLEX_UNIT_SP, 13);
                  tv.setTextColor(TITLE);
                  tv.setPadding(dp(10), dp(6), dp(10), dp(6));
                  tv.setBackground(makeRounded(bg, 18));

                  LinearLayout.LayoutParams lp = new LinearLayout.LayoutParams(
                          ViewGroup.LayoutParams.WRAP_CONTENT,
                          ViewGroup.LayoutParams.WRAP_CONTENT
                  );
                  lp.rightMargin = dp(8);
                  lp.topMargin = dp(2);
                  tv.setLayoutParams(lp);
                  return tv;
              }

              private void addLabelValue(LinearLayout parent, String label, String value) {
                  TextView l = new TextView(this);
                  l.setText(label);
                  l.setTextSize(TypedValue.COMPLEX_UNIT_SP, 17);
                  l.setTypeface(Typeface.DEFAULT_BOLD);
                  l.setTextColor(TITLE);
                  l.setPadding(0, dp(12), 0, dp(4));
                  parent.addView(l);

                  TextView v = new TextView(this);
                  v.setText(value);
                  v.setTextSize(TypedValue.COMPLEX_UNIT_SP, 16);
                  v.setTextColor(TEXT);
                  parent.addView(v);
              }

              private void addBox(LinearLayout parent, String titleText, String body, int bgColor) {
                  LinearLayout box = new LinearLayout(this);
                  box.setOrientation(LinearLayout.VERTICAL);
                  box.setBackground(makeRounded(bgColor, 20));
                  box.setPadding(dp(14), dp(14), dp(14), dp(14));

                  LinearLayout.LayoutParams lp = new LinearLayout.LayoutParams(
                          ViewGroup.LayoutParams.MATCH_PARENT,
                          ViewGroup.LayoutParams.WRAP_CONTENT
                  );
                  lp.topMargin = dp(12);
                  box.setLayoutParams(lp);

                  TextView title = new TextView(this);
                  title.setText(titleText);
                  title.setTextSize(TypedValue.COMPLEX_UNIT_SP, 17);
                  title.setTypeface(Typeface.DEFAULT_BOLD);
                  title.setTextColor(TITLE);
                  box.addView(title);

                  TextView text = new TextView(this);
                  text.setText(body);
                  text.setTextSize(TypedValue.COMPLEX_UNIT_SP, 16);
                  text.setTextColor(TEXT);
                  text.setPadding(0, dp(8), 0, 0);
                  box.addView(text);

                  parent.addView(box);
              }

              private GradientDrawable makeRounded(int color, int radiusDp) {
                  GradientDrawable d = new GradientDrawable();
                  d.setColor(color);
                  d.setCornerRadius(dp(radiusDp));
                  return d;
              }

              private LinearLayout.LayoutParams matchWrap(int bottomMarginDp) {
                  LinearLayout.LayoutParams lp = new LinearLayout.LayoutParams(
                          ViewGroup.LayoutParams.MATCH_PARENT,
                          ViewGroup.LayoutParams.WRAP_CONTENT
                  );
                  lp.bottomMargin = dp(bottomMarginDp);
                  return lp;
              }

              private void styleFilterButton(Button btn, boolean active) {
                  btn.setAllCaps(false);
                  btn.setTextSize(TypedValue.COMPLEX_UNIT_SP, 14);
                  btn.setPadding(dp(8), dp(10), dp(8), dp(10));
                  if (active) {
                      btn.setBackground(makeRounded(ACCENT, 18));
                      btn.setTextColor(Color.WHITE);
                  } else {
                      btn.setBackground(makeRounded(Color.WHITE, 18));
                      btn.setTextColor(TITLE);
                  }
              }

              private void updateFilterButtons(LinearLayout row) {
                  for (int i = 0; i < row.getChildCount(); i++) {
                      View child = row.getChildAt(i);
                      if (child instanceof Button) {
                          Button btn = (Button) child;
                          styleFilterButton(btn, btn.getText().toString().equals(currentSizeFilter));
                      }
                  }
              }

              private boolean isFavorite(String name) {
                  return prefs.getBoolean("fav_" + name, false);
              }

              private void toggleFavorite(String name) {
                  boolean current = isFavorite(name);
                  prefs.edit().putBoolean("fav_" + name, !current).apply();
              }

              private int dp(int value) {
                  float density = getResources().getDisplayMetrics().density;
                  return Math.round(value * density);
              }

              private void seedData() {
                  breeds.add(new RabbitBreed(
                          "Hermelin", "Liten", "ca. 0,8–1,3 kg", "Livlig",
                          "Våken, livlig og ofte kvikk.",
                          "Hvit rødøyd, hvit blåøyd og flere fargevarianter.",
                          "Kjønnsmoden tidlig. Små kull er vanlig sammenlignet med større raser.",
                          "• Tar lite plass\n• Lett å håndtere fysisk\n• Populær som kjæledyr",
                          "• Kan være nervøs\n• Passer ikke alltid for små barn\n• Små kull",
                          "• Rolig miljø\n• God sosialisering\n• Romslig binge\n• Mye høy og aktivitet"
                  ));

                  breeds.add(new RabbitBreed(
                          "Dvergvedder", "Liten", "ca. 1,4–1,9 kg", "Familievennlig",
                          "Ofte roligere og mer sosial enn mange andre små raser.",
                          "Viltgrå, svart, blå, hvit, madagaskar og flere.",
                          "Tidlig kjønnsmodning. Vanligvis moderate kull.",
                          "• Populær familiekanin\n• Ofte tillitsfull\n• Fin størrelse inne og ute",
                          "• Ørene må følges opp\n• Kan bli overvektig\n• Pelsen krever tilsyn i røyting",
                          "• Øresjekk\n• Vektkontroll\n• God plass til hopping\n• Gjerne selskap"
                  ));

                  breeds.add(new RabbitBreed(
                          "Løvehode", "Liten", "ca. 1,2–1,7 kg", "Mye stell",
                          "Søt, kvikk og nysgjerrig.",
                          "Hvit, svart, blå, viltfarget, japaner og flere.",
                          "Som liten rase blir den tidlig kjønnsmoden. Kullstørrelse ofte mindre enn hos store raser.",
                          "• Dekorativ\n• Populær selskapskanin\n• Mange fine farger",
                          "• Mer pelsstell\n• Kan få tover\n• Noen linjer kan ha tannproblemer",
                          "• Jevnlig pelsstell\n• Kontroll rundt øyne og bakpart\n• Fiberrik mat"
                  ));

                  breeds.add(new RabbitBreed(
                          "Rex", "Mellomstor", "ca. 3–4,5 kg", "Rolig",
                          "Rolig, vennlig og ofte lett å få tam.",
                          "Castor, svart, blå, hvit, havanna og otter.",
                          "Moderate kull. Ofte mer robust oppfostring enn hos de minste rasene.",
                          "• Fløyelsmyk pels\n• Rolig gemytt\n• Fin størrelse",
                          "• Pelsen tåler mindre røff håndtering\n• Kan få trykksår på dårlig underlag\n• Mindre værhard pels",
                          "• Tørt underlag\n• Rolig håndtering\n• God isolasjon vinterstid"
                  ));

                  breeds.add(new RabbitBreed(
                          "New Zealand", "Stor", "ca. 4–5,5 kg", "Robust",
                          "Rolig, robust og matglad.",
                          "Hvit, rød og svart.",
                          "Kjent for god reproduksjon og jevne kull. Større kull enn hos små raser er vanlig.",
                          "• Robust rase\n• God morsegenskap\n• Fin for større kaninhold",
                          "• Krever mer plass\n• Spiser mer\n• Tyngre for barn å håndtere",
                          "• Større binge\n• Godt underlag\n• Mer høy og fôr"
                  ));

                  breeds.add(new RabbitBreed(
                          "Fransk vedder", "Stor", "ca. 5–7 kg", "Stor og rolig",
                          "Mild, tung og ofte rolig.",
                          "Viltgrå, jerngrå, blå, svart, gul og flere.",
                          "Store hunner kan få gode kull, men rasen krever mer plass og oppfølging.",
                          "• Rolig uttrykk\n• Imponerende størrelse\n• Trivelig selskapskanin",
                          "• Trenger mye plass\n• Ørene må følges opp\n• Kan belaste ledd ved overvekt",
                          "• Romslig opphold\n• Tørt miljø\n• Vektkontroll\n• Stor utegård"
                  ));

                  breeds.add(new RabbitBreed(
                          "Belgisk hare", "Mellomstor", "ca. 3–4 kg", "Aktiv",
                          "Svært aktiv, følsom og elegant.",
                          "Rødbrun harefarget.",
                          "Kan avles fint, men rasen er ofte mer krevende i temperament og miljø.",
                          "• Vakker og atletisk\n• Høy aktivitet\n• Spennende rase for erfarne",
                          "• Kan være stresset\n• Mindre egnet for små barn\n• Krever mye plass og ro",
                          "• Lang løpeflate\n• Lite stress\n• Skjulesteder\n• Tålmodig håndtering"
                  ));

                  breeds.add(new RabbitBreed(
                          "Flandernkjempe", "Stor", "ca. 6–10+ kg", "Kjempe",
                          "Rolig kjempe, ofte mild og tregere i tempo.",
                          "Stålfarget, sand, svart, blå og lys grå.",
                          "Større kropp gir rom for større kull, men alt krever mer plass og kraftigere utstyr.",
                          "• Imponerende størrelse\n• Ofte rolig gemytt\n• Kan bli svært tam",
                          "• Krever mye plass\n• Spiser mye\n• Belaster poter og ledd mer",
                          "• Svært romslig opphold\n• Godt underlag\n• Vektkontroll\n• Robuste matskåler og hus"
                  ));
              }

              static class RabbitBreed {
                  String name;
                  String size;
                  String weight;
                  String tag;
                  String temperament;
                  String colors;
                  String reproduction;
                  String pros;
                  String cons;
                  String needs;

                  RabbitBreed(String name, String size, String weight, String tag, String temperament,
                              String colors, String reproduction, String pros, String cons, String needs) {
                      this.name = name;
                      this.size = size;
                      this.weight = weight;
                      this.tag = tag;
                      this.temperament = temperament;
                      this.colors = colors;
                      this.reproduction = reproduction;
                      this.pros = pros;
                      this.cons = cons;
                      this.needs = needs;
                  }

                  String searchText() {
                      return (name + " " + size + " " + weight + " " + tag + " " + temperament + " " +
                              colors + " " + reproduction + " " + pros + " " + cons + " " + needs)
                              .toLowerCase(Locale.ROOT);
                  }
              }
          }
          EOF

      - name: Build APK
        run: gradle assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: apk
          path: app/build/outputs/apk/debug/app-debug.apk
