name: Build APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Create project
        run: |
          mkdir -p app/src/main/java/com/trine/kanin

          echo "android.useAndroidX=true" > gradle.properties

          cat <<EOF > settings.gradle
          pluginManagement {
            repositories {
              google()
              mavenCentral()
              gradlePluginPortal()
            }
          }
          dependencyResolutionManagement {
            repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
            repositories {
              google()
              mavenCentral()
            }
          }
          rootProject.name="app"
          include(":app")
          EOF

          cat <<EOF > build.gradle
          plugins {
            id 'com.android.application' version '8.2.2' apply false
          }
          EOF

          cat <<EOF > app/build.gradle
          plugins {
            id 'com.android.application'
          }

          android {
            namespace "com.trine.kanin"
            compileSdk 34

            defaultConfig {
              applicationId "com.trine.kanin"
              minSdk 24
              targetSdk 34
              versionCode 2
              versionName "2.0"
            }

            buildTypes {
              release {
                minifyEnabled false
              }
            }

            compileOptions {
              sourceCompatibility JavaVersion.VERSION_17
              targetCompatibility JavaVersion.VERSION_17
            }
          }
          EOF

          cat <<EOF > app/src/main/AndroidManifest.xml
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <application
                  android:label="Trines kaninguide"
                  android:theme="@android:style/Theme.Material.Light.NoActionBar">
                  <activity
                      android:name=".MainActivity"
                      android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

          cat <<EOF > app/src/main/java/com/trine/kanin/MainActivity.java
          package com.trine.kanin;

          import android.app.Activity;
          import android.os.Bundle;
          import android.text.Editable;
          import android.text.TextWatcher;
          import android.widget.EditText;
          import android.widget.LinearLayout;
          import android.widget.ScrollView;
          import android.widget.TextView;

          public class MainActivity extends Activity {

              LinearLayout content;

              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);

                  ScrollView scroll = new ScrollView(this);
                  LinearLayout root = new LinearLayout(this);
                  root.setOrientation(LinearLayout.VERTICAL);
                  root.setPadding(20,20,20,20);

                  EditText search = new EditText(this);
                  search.setHint("Søk rase, farge, temperament...");
                  root.addView(search);

                  content = new LinearLayout(this);
                  content.setOrientation(LinearLayout.VERTICAL);
                  root.addView(content);

                  scroll.addView(root);
                  setContentView(scroll);

                  loadData("");

                  search.addTextChangedListener(new TextWatcher() {
                      public void afterTextChanged(Editable s) {}
                      public void beforeTextChanged(CharSequence s, int start, int count, int after) {}
                      public void onTextChanged(CharSequence s, int start, int before, int count) {
                          loadData(s.toString().toLowerCase());
                      }
                  });
              }

              void loadData(String filter) {
                  content.removeAllViews();

                  addText("Trines kaninguide 🐰");
                  addText("Søk etter rase, farger eller egenskaper");

                  addSection("Farger og avl (enkelt forklart)");
                  addText("• Blå + blå → ofte blå unger");
                  addText("• Hvit rødøyd kan skjule andre farger");
                  addText("• Viltgrå kan gi flere variasjoner");
                  addText("• Farger styres av gener – resultat varierer");

                  addRabbit("Hermelin", "liten hvit livlig nervøs");
                  addRabbit("Dvergvedder", "rolig familiekanin hengeører");
                  addRabbit("Løvehode", "mye pels søt krever stell");
                  addRabbit("Rex", "myk pels rolig mellomstor");
                  addRabbit("New Zealand", "stor robust god avl");
                  addRabbit("Fransk vedder", "stor tung rolig");
              }

              void addRabbit(String name, String data) {
                  if(!data.contains(currentFilter)) return;

                  TextView tv = new TextView(this);
                  tv.setText(name + " (" + data + ")");
                  tv.setTextSize(18);
                  content.addView(tv);
              }

              String currentFilter = "";

              void addText(String t){
                  TextView tv = new TextView(this);
                  tv.setText(t);
                  content.addView(tv);
              }

              void addSection(String t){
                  TextView tv = new TextView(this);
                  tv.setText("\n" + t);
                  tv.setTextSize(20);
                  content.addView(tv);
              }
          }
          EOF

      - name: Build APK
        run: gradle assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: apk
          path: app/build/outputs/apk/debug/app-debug.apk
