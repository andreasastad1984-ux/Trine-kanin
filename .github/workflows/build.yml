              static class RabbitBreed {
                  String name, size, weight, tag, temperament, colors, reproduction, pros, cons, needs, careLevel, crossingNote;
                  boolean familyFriendly;

                  RabbitBreed(String name, String size, String weight, String tag, String temperament,
                              String colors, String reproduction, String pros, String cons, String needs,
                              String careLevel, boolean familyFriendly, String crossingNote) {
                      this.name = name;
                      this.size = size;
                      this.weight = weight;
                      this.tag = tag;
                      this.temperament = temperament;
                      this.colors = colors;
                      this.reproduction = reproduction;
                      this.pros = pros;
                      this.cons = cons;
                      this.needs = needs;
                      this.careLevel = careLevel;
                      this.familyFriendly = familyFriendly;
                      this.crossingNote = crossingNote;
                  }

                  String searchText() {
                      return (name + " " + size + " " + weight + " " + tag + " " + temperament + " " +
                              colors + " " + reproduction + " " + pros + " " + cons + " " + needs + " " + careLevel)
                              .toLowerCase(Locale.ROOT);
                  }

                  String shortSummary() {
                      return temperament;
                  }
              }

              static class ScoredBreed {
                  RabbitBreed breed;
                  int score;
                  ScoredBreed(RabbitBreed breed, int score) {
                      this.breed = breed;
                      this.score = score;
                  }
              }
          }
