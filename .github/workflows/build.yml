              static class RabbitBreed {
                  String name, size, weight, tag, temperament, colors, reproduction, pros, cons, needs;
                  RabbitBreed(String name, String size, String weight, String tag, String temperament,
                              String colors, String reproduction, String pros, String cons, String needs) {
                      this.name = name;
                      this.size = size;
                      this.weight = weight;
                      this.tag = tag;
                      this.temperament = temperament;
                      this.colors = colors;
                      this.reproduction = reproduction;
                      this.pros = pros;
                      this.cons = cons;
                      this.needs = needs;
                  }
                  String searchText() {
                      return (name + " " + size + " " + weight + " " + tag + " " + temperament + " " +
                              colors + " " + reproduction + " " + pros + " " + cons + " " + needs)
                              .toLowerCase(Locale.ROOT);
                  }
              }
