              private String getTop3Result(String size, String temper, String care) {
                  List<ScoredBreed> scored = new ArrayList<>();

                  for (RabbitBreed b : breeds) {
                      int score = 0;
                      if (b.size.equals(size)) score += 3;
                      if (b.tag.toLowerCase(Locale.ROOT).contains(temper.toLowerCase(Locale.ROOT))) score += 3;
                      if (temper.equals("Familievennlig") && b.familyFriendly) score += 2;
                      if (temper.equals("Rolig") && b.temperament.toLowerCase(Locale.ROOT).contains("rolig")) score += 2;
                      if (temper.equals("Aktiv") && b.temperament.toLowerCase(Locale.ROOT).contains("aktiv")) score += 2;
                      if (care.equals("Mye stell") && b.tag.toLowerCase(Locale.ROOT).contains("stell")) score += 2;
                      if (care.equals("Lite stell") && !b.tag.toLowerCase(Locale.ROOT).contains("stell")) score += 1;
                      scored.add(new ScoredBreed(b, score));
                  }

                  Collections.sort(scored, (a, b) -> b.score - a.score);

                  StringBuilder sb = new StringBuilder();
                  sb.append("Topp 3 forslag:\n");
                  for (int i = 0; i < Math.min(3, scored.size()); i++) {
                      RabbitBreed breed = scored.get(i).breed;
                      sb.append(i + 1).append(". ").append(breed.name).append(" – ").append(breed.tag).append("\n");
                  }
                  return sb.toString().trim();
              }

              private String getBetterColorResult(String mother, String father) {
                  if (mother.equals("Blå") && father.equals("Blå")) {
                      return "Mulige utfall:\n• Blå\n• Hovedsakelig blå avkom\n• Fortsatt avhengig av skjulte gener";
                  }
                  if (mother.equals("Hvit rødøyd") || father.equals("Hvit rødøyd")) {
                      return "Mulige utfall:\n• Hvit rødøyd\n• Andre skjulte farger kan dukke opp\n• Kombinasjonen er mindre forutsigbar";
                  }
                  if (mother.equals("Viltgrå") && father.equals("Viltgrå")) {
                      return "Mulige utfall:\n• Viltgrå\n• Mørkere variasjoner\n• Andre nyanser hvis foreldrene bærer skjulte gener";
                  }
                  if (mother.equals("Svart") && father.equals("Svart")) {
                      return "Mulige utfall:\n• Svart\n• Mørke variasjoner\n• Skjulte gener kan påvirke";
                  }
                  if (mother.equals("Japaner") || father.equals("Japaner")) {
                      return "Mulige utfall:\n• Japaner-tegninger\n• Ulike markeringer\n• Vanskelig å forutsi helt nøyaktig";
                  }
                  if (mother.equals("Madagaskar") || father.equals("Madagaskar")) {
                      return "Mulige utfall:\n• Varme bruntoner\n• Ulike mørke markeringer\n• Fortsatt veiledende, ikke fasit";
                  }
                  return "Mulige utfall:\n• Flere varianter\n• Blanding av foreldrefarger\n• Resultatet er kun veiledende";
              }

              private String getComparison(RabbitBreed a, RabbitBreed b) {
                  if (a == null || b == null) return "Fant ikke begge rasene.";
                  if (a.name.equals(b.name)) return "Du har valgt samme rase to ganger.";

                  StringBuilder sb = new StringBuilder();
                  sb.append(a.name).append(" vs ").append(b.name).append("\n\n");
                  sb.append("Størrelse:\n");
                  sb.append("• ").append(a.name).append(": ").append(a.size).append(" (").append(a.weight).append(")\n");
                  sb.append("• ").append(b.name).append(": ").append(b.size).append(" (").append(b.weight).append(")\n\n");
                  sb.append("Temperament:\n");
                  sb.append("• ").append(a.name).append(": ").append(a.temperament).append("\n");
                  sb.append("• ").append(b.name).append(": ").append(b.temperament).append("\n\n");
                  sb.append("Stell:\n");
                  sb.append("• ").append(a.name).append(": ").append(a.careLevel).append("\n");
                  sb.append("• ").append(b.name).append(": ").append(b.careLevel).append("\n\n");
                  sb.append("Kort vurdering:\n");
                  sb.append("• ").append(a.name).append(" passer ");
                  sb.append(a.familyFriendly ? "ofte godt i familie" : "ofte best med ro og erfaring").append("\n");
                  sb.append("• ").append(b.name).append(" passer ");
                  sb.append(b.familyFriendly ? "ofte godt i familie" : "ofte best med ro og erfaring");
                  return sb.toString();
              }

              private String getCrossingInfo(RabbitBreed a, RabbitBreed b) {
                  if (a == null || b == null) return "Fant ikke begge rasene.";
                  if (a.name.equals(b.name)) {
                      return "Samme rase valgt.\n\nDette kan gi mer forutsigbar type, størrelse og temperament hvis linjene er gode.";
                  }

                  StringBuilder sb = new StringBuilder();
                  sb.append("Vurdering av ").append(a.name).append(" × ").append(b.name).append("\n\n");

                  if (!a.size.equals(b.size)) {
                      sb.append("• Ulik størrelse: vær forsiktig ved stor forskjell mellom foreldrene.\n");
                  } else {
                      sb.append("• Lik størrelse: ofte enklere å få jevn type og størrelse.\n");
                  }

                  if (a.careLevel.equals("Mye stell") || b.careLevel.equals("Mye stell")) {
                      sb.append("• Minst én rase krever mye stell. Avkom kan trenge mer pels- eller oppfølgingsarbeid.\n");
                  }

                  if (a.temperament.toLowerCase(Locale.ROOT).contains("rolig") && b.temperament.toLowerCase(Locale.ROOT).contains("rolig")) {
                      sb.append("• Begge virker rolige. Det kan gi roligere avkom, men ikke garanti.\n");
                  } else {
                      sb.append("• Temperament kan bli mer blandet. Velg rolige og sunne dyr.\n");
                  }

                  sb.append("• Farger og tegninger kan variere mye, spesielt hvis foreldrene bærer skjulte gener.\n");
                  sb.append("• Viktigst er helse, bygning, lynne og god oppfølging — ikke bare farge.\n\n");
                  sb.append("Kort råd: ").append(a.crossingNote).append(" ").append(b.crossingNote);

                  return sb.toString();
              }

              private RabbitBreed findBreed(String name) {
                  for (RabbitBreed b : breeds) {
                      if (b.name.equals(name)) return b;
                  }
                  return null;
              }

              private List<String> getBreedNames() {
                  List<String> names = new ArrayList<>();
                  for (RabbitBreed b : breeds) names.add(b.name);
                  return names;
              }

              private List<RabbitBreed> getSuggestions(String query) {
                  List<RabbitBreed> out = new ArrayList<>();
                  String q = query == null ? "" : query.trim().toLowerCase(Locale.ROOT);
                  if (q.isEmpty()) return out;

                  for (RabbitBreed breed : breeds) {
                      if (breed.searchText().contains(q)) out.add(breed);
                  }

                  Collections.sort(out, Comparator.comparing(a -> a.name));
                  return out;
              }

