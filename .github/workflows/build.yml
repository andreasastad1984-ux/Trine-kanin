name: Build APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Create project
        run: |
          mkdir -p app/src/main/java/com/trine/kanin
          mkdir -p app/src/main/res/values

          echo "android.useAndroidX=true" > gradle.properties

          cat <<EOF > settings.gradle
          pluginManagement {
            repositories {
              google()
              mavenCentral()
              gradlePluginPortal()
            }
          }
          dependencyResolutionManagement {
            repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
            repositories {
              google()
              mavenCentral()
            }
          }
          rootProject.name="app"
          include(":app")
          EOF

          cat <<EOF > build.gradle
          plugins {
            id 'com.android.application' version '8.2.2' apply false
          }
          EOF

          cat <<EOF > app/build.gradle
          plugins {
            id 'com.android.application'
          }

          android {
            namespace "com.trine.kanin"
            compileSdk 34

            defaultConfig {
              applicationId "com.trine.kanin"
              minSdk 24
              targetSdk 34
              versionCode 3
              versionName "3.0"
            }

            buildTypes {
              release {
                minifyEnabled false
              }
            }

            compileOptions {
              sourceCompatibility JavaVersion.VERSION_17
              targetCompatibility JavaVersion.VERSION_17
            }
          }
          EOF

          cat <<EOF > app/src/main/AndroidManifest.xml
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <application
                  android:label="Trines kaninguide"
                  android:theme="@android:style/Theme.Material.Light.NoActionBar">
                  <activity
                      android:name=".MainActivity"
                      android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

          cat <<EOF > app/src/main/res/values/strings.xml
          <resources>
              <string name="app_name">Trines kaninguide</string>
          </resources>
          EOF

          cat <<EOF > app/src/main/java/com/trine/kanin/MainActivity.java
          package com.trine.kanin;

          import android.app.Activity;
          import android.graphics.Color;
          import android.graphics.Typeface;
          import android.os.Bundle;
          import android.text.Editable;
          import android.text.TextWatcher;
          import android.util.TypedValue;
          import android.view.ViewGroup;
          import android.widget.EditText;
          import android.widget.LinearLayout;
          import android.widget.ScrollView;
          import android.widget.TextView;

          import java.util.ArrayList;
          import java.util.List;
          import java.util.Locale;

          public class MainActivity extends Activity {

              private LinearLayout contentLayout;
              private final List<RabbitBreed> breeds = new ArrayList<>();

              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);

                  seedData();

                  ScrollView scrollView = new ScrollView(this);
                  scrollView.setBackgroundColor(Color.parseColor("#F3F4F6"));

                  LinearLayout root = new LinearLayout(this);
                  root.setOrientation(LinearLayout.VERTICAL);
                  root.setPadding(dp(16), dp(16), dp(16), dp(24));

                  TextView title = new TextView(this);
                  title.setText("Trines kaninguide 🐰");
                  title.setTextSize(TypedValue.COMPLEX_UNIT_SP, 26);
                  title.setTypeface(Typeface.DEFAULT_BOLD);
                  title.setTextColor(Color.parseColor("#111827"));
                  root.addView(title);

                  TextView subtitle = new TextView(this);
                  subtitle.setText("Søk etter rase, farge, temperament eller egenskaper.");
                  subtitle.setTextSize(TypedValue.COMPLEX_UNIT_SP, 16);
                  subtitle.setTextColor(Color.parseColor("#4B5563"));
                  subtitle.setPadding(0, dp(8), 0, dp(12));
                  root.addView(subtitle);

                  EditText search = new EditText(this);
                  search.setHint("Søk...");
                  search.setSingleLine(true);
                  search.setPadding(dp(14), dp(12), dp(14), dp(12));
                  search.setTextSize(TypedValue.COMPLEX_UNIT_SP, 16);
                  search.setBackgroundColor(Color.WHITE);
                  root.addView(search, new LinearLayout.LayoutParams(
                          ViewGroup.LayoutParams.MATCH_PARENT,
                          ViewGroup.LayoutParams.WRAP_CONTENT
                  ));

                  contentLayout = new LinearLayout(this);
                  contentLayout.setOrientation(LinearLayout.VERTICAL);
                  contentLayout.setPadding(0, dp(16), 0, 0);
                  root.addView(contentLayout);

                  scrollView.addView(root);
                  setContentView(scrollView);

                  render("");

                  search.addTextChangedListener(new TextWatcher() {
                      @Override
                      public void beforeTextChanged(CharSequence s, int start, int count, int after) {}

                      @Override
                      public void onTextChanged(CharSequence s, int start, int before, int count) {
                          render(s.toString());
                      }

                      @Override
                      public void afterTextChanged(Editable s) {}
                  });
              }

              private void render(String query) {
                  contentLayout.removeAllViews();

                  addInfoBox("Farger og avl – enkelt forklart",
                          new String[]{
                                  "Blå + blå gir ofte blå unger.",
                                  "Hvit rødøyd kan skjule andre farger.",
                                  "Viltgrå kan gi flere variasjoner.",
                                  "Fargeutfall styres av gener og er aldri 100 % garantert."
                          });

                  String q = query == null ? "" : query.trim().toLowerCase(Locale.ROOT);
                  int matches = 0;

                  for (RabbitBreed breed : breeds) {
                      if (q.isEmpty() || breed.searchText().contains(q)) {
                          contentLayout.addView(createBreedCard(breed));
                          matches++;
                      }
                  }

                  if (matches == 0) {
                      TextView empty = new TextView(this);
                      empty.setText("Ingen treff på søket ditt.");
                      empty.setTextSize(TypedValue.COMPLEX_UNIT_SP, 18);
                      empty.setTextColor(Color.parseColor("#6B7280"));
                      empty.setPadding(0, dp(8), 0, 0);
                      contentLayout.addView(empty);
                  }
              }

              private void addInfoBox(String heading, String[] lines) {
                  LinearLayout box = new LinearLayout(this);
                  box.setOrientation(LinearLayout.VERTICAL);
                  box.setBackgroundColor(Color.parseColor("#FFF4E5"));
                  box.setPadding(dp(14), dp(14), dp(14), dp(14));

                  LinearLayout.LayoutParams lp = new LinearLayout.LayoutParams(
                          ViewGroup.LayoutParams.MATCH_PARENT,
                          ViewGroup.LayoutParams.WRAP_CONTENT
                  );
                  lp.bottomMargin = dp(14);
                  box.setLayoutParams(lp);

                  TextView title = new TextView(this);
                  title.setText(heading);
                  title.setTextSize(TypedValue.COMPLEX_UNIT_SP, 20);
                  title.setTypeface(Typeface.DEFAULT_BOLD);
                  title.setTextColor(Color.parseColor("#92400E"));
                  box.addView(title);

                  for (String line : lines) {
                      TextView tv = new TextView(this);
                      tv.setText("• " + line);
                      tv.setTextSize(TypedValue.COMPLEX_UNIT_SP, 16);
                      tv.setTextColor(Color.parseColor("#374151"));
                      tv.setPadding(0, dp(8), 0, 0);
                      box.addView(tv);
                  }

                  contentLayout.addView(box);
              }

              private LinearLayout createBreedCard(RabbitBreed breed) {
                  LinearLayout card = new LinearLayout(this);
                  card.setOrientation(LinearLayout.VERTICAL);
                  card.setBackgroundColor(Color.WHITE);
                  card.setPadding(dp(16), dp(16), dp(16), dp(16));

                  LinearLayout.LayoutParams lp = new LinearLayout.LayoutParams(
                          ViewGroup.LayoutParams.MATCH_PARENT,
                          ViewGroup.LayoutParams.WRAP_CONTENT
                  );
                  lp.bottomMargin = dp(14);
                  card.setLayoutParams(lp);

                  TextView title = new TextView(this);
                  title.setText(breed.name);
                  title.setTextSize(TypedValue.COMPLEX_UNIT_SP, 24);
                  title.setTypeface(Typeface.DEFAULT_BOLD);
                  title.setTextColor(Color.parseColor("#111827"));
                  card.addView(title);

                  TextView meta = new TextView(this);
                  meta.setText(breed.meta);
                  meta.setTextSize(TypedValue.COMPLEX_UNIT_SP, 15);
                  meta.setTextColor(Color.parseColor("#6B7280"));
                  meta.setPadding(0, dp(6), 0, dp(10));
                  card.addView(meta);

                  addLabelValue(card, "Temperament", breed.temperament);
                  addLabelValue(card, "Vanlige farger", breed.colors);
                  addLabelValue(card, "Reproduksjon", breed.reproduction);
                  addLabelValue(card, "Fordeler", breed.pros);
                  addLabelValue(card, "Ulemper", breed.cons);
                  addLabelValue(card, "Hva rasen krever", breed.needs);

                  return card;
              }

              private void addLabelValue(LinearLayout parent, String label, String value) {
                  TextView l = new TextView(this);
                  l.setText(label);
                  l.setTextSize(TypedValue.COMPLEX_UNIT_SP, 17);
                  l.setTypeface(Typeface.DEFAULT_BOLD);
                  l.setTextColor(Color.parseColor("#111827"));
                  l.setPadding(0, dp(8), 0, dp(4));
                  parent.addView(l);

                  TextView v = new TextView(this);
                  v.setText(value);
                  v.setTextSize(TypedValue.COMPLEX_UNIT_SP, 16);
                  v.setTextColor(Color.parseColor("#374151"));
                  parent.addView(v);
              }

              private int dp(int value) {
                  float density = getResources().getDisplayMetrics().density;
                  return Math.round(value * density);
              }

              private void seedData() {
                  breeds.add(new RabbitBreed(
                          "Hermelin",
                          "Liten • ca. 0,8–1,3 kg",
                          "Våken, livlig og ofte kvikk.",
                          "Hvit rødøyd, hvit blåøyd og flere fargevarianter.",
                          "Kjønnsmoden tidlig. Små kull er vanlig sammenlignet med større raser.",
                          "Tar lite plass. Lett å håndtere fysisk. Populær som kjæledyr.",
                          "Kan være nervøs. Passer ikke alltid for små barn. Små kull.",
                          "Rolig miljø. God sosialisering. Romslig binge. Mye høy og aktivitet."
                  ));

                  breeds.add(new RabbitBreed(
                          "Dvergvedder",
                          "Liten • ca. 1,4–1,9 kg",
                          "Ofte roligere og mer sosial enn mange andre små raser.",
                          "Viltgrå, svart, blå, hvit, madagaskar og flere.",
                          "Tidlig kjønnsmodning. Vanligvis moderate kull.",
                          "Populær familiekanin. Ofte tillitsfull. Fin størrelse inne og ute.",
                          "Ørene må følges opp. Kan bli overvektig. Pelsen krever tilsyn i røyting.",
                          "Øresjekk. Vektkontroll. God plass til hopping. Gjerne selskap."
                  ));

                  breeds.add(new RabbitBreed(
                          "Løvehode",
                          "Liten • ca. 1,2–1,7 kg",
                          "Søt, kvikk og nysgjerrig.",
                          "Hvit, svart, blå, viltfarget, japaner og flere.",
                          "Som liten rase blir den tidlig kjønnsmoden. Kullstørrelse ofte mindre enn hos store raser.",
                          "Dekorativ. Populær selskapskanin. Mange fine farger.",
                          "Mer pelsstell. Kan få tover. Noen linjer kan ha tannproblemer.",
                          "Jevnlig pelsstell. Kontroll rundt øyne og bakpart. Fiberrik mat."
                  ));

                  breeds.add(new RabbitBreed(
                          "Rex",
                          "Mellomstor • ca. 3–4,5 kg",
                          "Rolig, vennlig og ofte lett å få tam.",
                          "Castor, svart, blå, hvit, havanna og otter.",
                          "Moderate kull. Ofte mer robust oppfostring enn hos de minste rasene.",
                          "Fløyelsmyk pels. Rolig gemytt. Fin størrelse.",
                          "Pelsen tåler mindre røff håndtering. Kan få trykksår på dårlig underlag. Mindre værhard pels.",
                          "Tørt underlag. Rolig håndtering. God isolasjon vinterstid."
                  ));

                  breeds.add(new RabbitBreed(
                          "New Zealand",
                          "Stor • ca. 4–5,5 kg",
                          "Rolig, robust og matglad.",
                          "Hvit, rød og svart.",
                          "Kjent for god reproduksjon og jevne kull. Større kull enn hos små raser er vanlig.",
                          "Robust rase. God morsegenskap. Fin for større kaninhold.",
                          "Krever mer plass. Spiser mer. Tyngre for barn å håndtere.",
                          "Større binge. Godt underlag. Mer høy og fôr."
                  ));

                  breeds.add(new RabbitBreed(
                          "Fransk vedder",
                          "Stor • ca. 5–7 kg",
                          "Mild, tung og ofte rolig.",
                          "Viltgrå, jerngrå, blå, svart, gul og flere.",
                          "Store hunner kan få gode kull, men rasen krever mer plass og oppfølging.",
                          "Rolig uttrykk. Imponerende størrelse. Trivelig selskapskanin.",
                          "Trenger mye plass. Ørene må følges opp. Kan belaste ledd ved overvekt.",
                          "Romslig opphold. Tørt miljø. Vektkontroll. Stor utegård."
                  ));

                  breeds.add(new RabbitBreed(
                          "Belgisk hare",
                          "Mellomstor til stor • ca. 3–4 kg",
                          "Svært aktiv, følsom og elegant.",
                          "Rødbrun harefarget.",
                          "Kan avles fint, men rasen er ofte mer krevende i temperament og miljø.",
                          "Vakker og atletisk. Høy aktivitet. Spennende rase for erfarne.",
                          "Kan være stresset. Mindre egnet for små barn. Krever mye plass og ro.",
                          "Lang løpeflate. Lite stress. Skjulesteder. Tålmodig håndtering."
                  ));

                  breeds.add(new RabbitBreed(
                          "Flandernkjempe",
                          "Svært stor • ca. 6–10+ kg",
                          "Rolig kjempe, ofte mild og tregere i tempo.",
                          "Stålfarget, sand, svart, blå og lys grå.",
                          "Større kropp gir rom for større kull, men alt krever mer plass og kraftigere utstyr.",
                          "Imponerende størrelse. Ofte rolig gemytt. Kan bli svært tam.",
                          "Krever mye plass. Spiser mye. Belaster poter og ledd mer.",
                          "Svært romslig opphold. Godt underlag. Vektkontroll. Robuste matskåler og hus."
                  ));
              }

              static class RabbitBreed {
                  String name;
                  String meta;
                  String temperament;
                  String colors;
                  String reproduction;
                  String pros;
                  String cons;
                  String needs;

                  RabbitBreed(String name, String meta, String temperament, String colors,
                              String reproduction, String pros, String cons, String needs) {
                      this.name = name;
                      this.meta = meta;
                      this.temperament = temperament;
                      this.colors = colors;
                      this.reproduction = reproduction;
                      this.pros = pros;
                      this.cons = cons;
                      this.needs = needs;
                  }

                  String searchText() {
                      return (name + " " + meta + " " + temperament + " " + colors + " " +
                              reproduction + " " + pros + " " + cons + " " + needs)
                              .toLowerCase(Locale.ROOT);
                  }
              }
          }
          EOF

      - name: Build APK
        run: gradle assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: apk
          path: app/build/outputs/apk/debug/app-debug.apk
