          cat <<'EOF' > app/src/main/java/com/trine/kanin/DetailActivity.java
          package com.trine.kanin;

          import android.app.Activity;
          import android.content.SharedPreferences;
          import android.graphics.Color;
          import android.graphics.Typeface;
          import android.graphics.drawable.GradientDrawable;
          import android.os.Bundle;
          import android.util.TypedValue;
          import android.view.Gravity;
          import android.view.ViewGroup;
          import android.widget.Button;
          import android.widget.LinearLayout;
          import android.widget.ScrollView;
          import android.widget.TextView;

          public class DetailActivity extends Activity {

              private SharedPreferences prefs;

              private final int BG = Color.parseColor("#FFF9F5");
              private final int CARD = Color.parseColor("#FFFFFF");
              private final int TITLE = Color.parseColor("#2F2A2A");
              private final int TEXT = Color.parseColor("#5B5451");
              private final int SOFT_TEXT = Color.parseColor("#7C726C");
              private final int PINK = Color.parseColor("#F9DDE3");
              private final int SAGE = Color.parseColor("#E4F0E8");
              private final int SAND = Color.parseColor("#F3ECE3");
              private final int LAV = Color.parseColor("#EEE7F8");
              private final int BORDER = Color.parseColor("#E9DED3");
              private final int IMAGE_BG = Color.parseColor("#FFF6FB");
              private final int GOLD = Color.parseColor("#FFF0B8");
              private final int GOLD_BORDER = Color.parseColor("#E0C56E");

              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);

                  prefs = getSharedPreferences("kaninguide", MODE_PRIVATE);

                  String name = getIntent().getStringExtra("name");
                  String size = getIntent().getStringExtra("size");
                  String weight = getIntent().getStringExtra("weight");
                  String tag = getIntent().getStringExtra("tag");
                  String temperament = getIntent().getStringExtra("temperament");
                  String colors = getIntent().getStringExtra("colors");
                  String reproduction = getIntent().getStringExtra("reproduction");
                  String pros = getIntent().getStringExtra("pros");
                  String cons = getIntent().getStringExtra("cons");
                  String needs = getIntent().getStringExtra("needs");
                  String careLevel = getIntent().getStringExtra("careLevel");
                  String crossingNote = getIntent().getStringExtra("crossingNote");

                  ScrollView scrollView = new ScrollView(this);
                  scrollView.setBackgroundColor(BG);

                  LinearLayout root = new LinearLayout(this);
                  root.setOrientation(LinearLayout.VERTICAL);
                  root.setPadding(dp(16), dp(16), dp(16), dp(24));

                  LinearLayout card = new LinearLayout(this);
                  card.setOrientation(LinearLayout.VERTICAL);
                  card.setPadding(dp(18), dp(18), dp(18), dp(18));
                  card.setBackground(makeRounded(CARD, 28, BORDER, 2));

                  LinearLayout topBar = new LinearLayout(this);
                  topBar.setOrientation(LinearLayout.HORIZONTAL);

                  LinearLayout left = new LinearLayout(this);
                  left.setOrientation(LinearLayout.VERTICAL);
                  left.setLayoutParams(new LinearLayout.LayoutParams(0, ViewGroup.LayoutParams.WRAP_CONTENT, 1f));

                  TextView title = new TextView(this);
                  title.setText(name);
                  title.setTextSize(TypedValue.COMPLEX_UNIT_SP, 30);
                  title.setTypeface(Typeface.DEFAULT_BOLD);
                  title.setTextColor(TITLE);
                  left.addView(title);

                  TextView meta = new TextView(this);
                  meta.setText(size + " • " + weight);
                  meta.setTextSize(TypedValue.COMPLEX_UNIT_SP, 16);
                  meta.setTextColor(TEXT);
                  meta.setPadding(0, dp(6), 0, dp(10));
                  left.addView(meta);

                  LinearLayout badges = new LinearLayout(this);
                  badges.setOrientation(LinearLayout.HORIZONTAL);
                  badges.addView(makeBadge(size, LAV));
                  badges.addView(makeBadge(tag, SAGE));
                  left.addView(badges);

                  topBar.addView(left);

                  Button favBtn = new Button(this);
                  boolean favorite = isFavorite(name);
                  favBtn.setText(favorite ? "★ Lagret" : "☆ Favoritt");
                  favBtn.setAllCaps(false);
                  favBtn.setTextSize(TypedValue.COMPLEX_UNIT_SP, 14);
                  favBtn.setBackground(makeRounded(GOLD, 18, GOLD_BORDER, 2));
                  favBtn.setTextColor(Color.parseColor("#8A5B00"));
                  favBtn.setOnClickListener(v -> {
                      toggleFavorite(name);
                      boolean newFav = isFavorite(name);
                      favBtn.setText(newFav ? "★ Lagret" : "☆ Favoritt");
                  });
                  topBar.addView(favBtn);

                  card.addView(topBar);

                  LinearLayout imageHolder = new LinearLayout(this);
                  imageHolder.setOrientation(LinearLayout.VERTICAL);
                  imageHolder.setGravity(Gravity.CENTER);
                  imageHolder.setBackground(makeRounded(IMAGE_BG, 22, BORDER, 2));
                  imageHolder.setPadding(dp(12), dp(22), dp(12), dp(22));

                  LinearLayout.LayoutParams imgLp = new LinearLayout.LayoutParams(
                          ViewGroup.LayoutParams.MATCH_PARENT,
                          dp(210)
                  );
                  imgLp.topMargin = dp(16);
                  imageHolder.setLayoutParams(imgLp);

                  TextView bunny = new TextView(this);
                  bunny.setText("🐇");
                  bunny.setTextSize(TypedValue.COMPLEX_UNIT_SP, 46);
                  imageHolder.addView(bunny);

                  TextView imgText = new TextView(this);
                  imgText.setText("Lokal bildeplassholder for " + name);
                  imgText.setTextSize(TypedValue.COMPLEX_UNIT_SP, 14);
                  imgText.setTextColor(SOFT_TEXT);
                  imgText.setPadding(0, dp(8), 0, 0);
                  imageHolder.addView(imgText);

                  card.addView(imageHolder);

                  addLabelValue(card, "Temperament", temperament);
                  addLabelValue(card, "Vanlige farger", colors);
                  addLabelValue(card, "Reproduksjon", reproduction);
                  addLabelValue(card, "Stellnivå", careLevel);

                  addBox(card, "Fordeler", pros, SAGE);
                  addBox(card, "Ulemper", cons, PINK);
                  addBox(card, "Hva rasen krever", needs, SAND);
                  addBox(card, "Om kryssing", crossingNote, Color.parseColor("#FFF8EF"));

                  Button backBtn = new Button(this);
                  backBtn.setText("← Tilbake");
                  backBtn.setAllCaps(false);
                  backBtn.setTextColor(TITLE);
                  backBtn.setBackground(makeRounded(Color.parseColor("#F7F1EB"), 18, BORDER, 2));
                  LinearLayout.LayoutParams backLp = matchWrap(0);
                  backLp.topMargin = dp(14);
                  backBtn.setLayoutParams(backLp);
                  backBtn.setOnClickListener(v -> finish());
                  card.addView(backBtn);

                  root.addView(card);
                  scrollView.addView(root);
                  setContentView(scrollView);
              }

              private boolean isFavorite(String name) {
                  return prefs.getBoolean("fav_" + name, false);
              }

              private void toggleFavorite(String name) {
                  boolean current = isFavorite(name);
                  prefs.edit().putBoolean("fav_" + name, !current).apply();
              }

              private TextView makeBadge(String text, int bg) {
                  TextView tv = new TextView(this);
                  tv.setText(text);
                  tv.setTextSize(TypedValue.COMPLEX_UNIT_SP, 13);
                  tv.setTextColor(TITLE);
                  tv.setPadding(dp(10), dp(6), dp(10), dp(6));
                  tv.setBackground(makeRounded(bg, 18, 0, 0));

                  LinearLayout.LayoutParams lp = new LinearLayout.LayoutParams(
                          ViewGroup.LayoutParams.WRAP_CONTENT,
                          ViewGroup.LayoutParams.WRAP_CONTENT
                  );
                  lp.rightMargin = dp(8);
                  tv.setLayoutParams(lp);
                  return tv;
              }

              private void addLabelValue(LinearLayout parent, String label, String value) {
                  TextView l = new TextView(this);
                  l.setText(label);
                  l.setTextSize(TypedValue.COMPLEX_UNIT_SP, 18);
                  l.setTypeface(Typeface.DEFAULT_BOLD);
                  l.setTextColor(TITLE);
                  l.setPadding(0, dp(14), 0, dp(4));
                  parent.addView(l);

                  TextView v = new TextView(this);
                  v.setText(value);
                  v.setTextSize(TypedValue.COMPLEX_UNIT_SP, 16);
                  v.setTextColor(TEXT);
                  parent.addView(v);
              }

              private void addBox(LinearLayout parent, String titleText, String body, int bgColor) {
                  LinearLayout box = new LinearLayout(this);
                  box.setOrientation(LinearLayout.VERTICAL);
                  box.setBackground(makeRounded(bgColor, 22, 0, 0));
                  box.setPadding(dp(14), dp(14), dp(14), dp(14));

                  LinearLayout.LayoutParams lp = new LinearLayout.LayoutParams(
                          ViewGroup.LayoutParams.MATCH_PARENT,
                          ViewGroup.LayoutParams.WRAP_CONTENT
                  );
                  lp.topMargin = dp(12);
                  box.setLayoutParams(lp);

                  TextView title = new TextView(this);
                  title.setText(titleText);
                  title.setTextSize(TypedValue.COMPLEX_UNIT_SP, 17);
                  title.setTypeface(Typeface.DEFAULT_BOLD);
                  title.setTextColor(TITLE);
                  box.addView(title);

                  TextView text = new TextView(this);
                  text.setText(body);
                  text.setTextSize(TypedValue.COMPLEX_UNIT_SP, 16);
                  text.setTextColor(TEXT);
                  text.setPadding(0, dp(8), 0, 0);
                  box.addView(text);

                  parent.addView(box);
              }

              private GradientDrawable makeRounded(int color, int radiusDp, int strokeColor, int strokeDp) {
                  GradientDrawable d = new GradientDrawable();
                  d.setColor(color);
                  d.setCornerRadius(dp(radiusDp));
                  if (strokeDp > 0) d.setStroke(dp(strokeDp), strokeColor);
                  return d;
              }

              private LinearLayout.LayoutParams matchWrap(int bottomMarginDp) {
                  LinearLayout.LayoutParams lp = new LinearLayout.LayoutParams(
                          ViewGroup.LayoutParams.MATCH_PARENT,
                          ViewGroup.LayoutParams.WRAP_CONTENT
                  );
                  lp.bottomMargin = dp(bottomMarginDp);
                  return lp;
              }

              private int dp(int value) {
                  float density = getResources().getDisplayMetrics().density;
                  return Math.round(value * density);
              }
          }
