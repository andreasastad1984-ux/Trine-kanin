name: Build APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Create project
        run: |
          mkdir -p app/src/main/java/com/trine/kanin
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/drawable
          mkdir -p app/src/main/res/mipmap-anydpi-v26

          echo "android.useAndroidX=true" > gradle.properties

          cat <<EOF > settings.gradle
          pluginManagement {
            repositories {
              google()
              mavenCentral()
              gradlePluginPortal()
            }
          }
          dependencyResolutionManagement {
            repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
            repositories {
              google()
              mavenCentral()
            }
          }
          rootProject.name="app"
          include(":app")
          EOF

          cat <<EOF > build.gradle
          plugins {
            id 'com.android.application' version '8.2.2' apply false
          }
          EOF

          cat <<EOF > app/build.gradle
          plugins {
            id 'com.android.application'
          }

          android {
            namespace "com.trine.kanin"
            compileSdk 34

            defaultConfig {
              applicationId "com.trine.kanin"
              minSdk 24
              targetSdk 34
              versionCode 12
              versionName "12.0"
            }

            buildTypes {
              release {
                minifyEnabled false
              }
            }

            compileOptions {
              sourceCompatibility JavaVersion.VERSION_17
              targetCompatibility JavaVersion.VERSION_17
            }
          }
          EOF

          cat <<EOF > app/src/main/AndroidManifest.xml
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <application
                  android:label="Kaninguide"
                  android:icon="@mipmap/ic_launcher"
                  android:roundIcon="@mipmap/ic_launcher"
                  android:theme="@style/AppTheme">
                  <activity
                      android:name=".MainActivity"
                      android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

          cat <<EOF > app/src/main/res/values/strings.xml
          <resources>
              <string name="app_name">Kaninguide</string>
          </resources>
          EOF

          cat <<EOF > app/src/main/res/values/themes.xml
          <resources>
              <style name="AppTheme" parent="@android:style/Theme.Material.Light.NoActionBar">
                  <item name="android:windowBackground">@drawable/splash_bg</item>
              </style>
          </resources>
          EOF

          cat <<EOF > app/src/main/res/drawable/splash_bg.xml
          <layer-list xmlns:android="http://schemas.android.com/apk/res/android">
              <item android:drawable="@android:color/white"/>
              <item>
                  <shape android:shape="rectangle">
                      <solid android:color="#FFF9F5"/>
                  </shape>
              </item>
          </layer-list>
          EOF

          cat <<EOF > app/src/main/res/drawable/ic_launcher_foreground.xml
          <vector xmlns:android="http://schemas.android.com/apk/res/android"
              android:width="108dp"
              android:height="108dp"
              android:viewportWidth="108"
              android:viewportHeight="108">
              <path
                  android:fillColor="#FFF9F5"
                  android:pathData="M0,0h108v108h-108z"/>
              <path
                  android:fillColor="#B96E7B"
                  android:pathData="M54,22c-15,0 -27,10 -27,24c0,11 8,20 18,24l0,10l18,0l0,-10c10,-4 18,-13 18,-24c0,-14 -12,-24 -27,-24z"/>
              <path
                  android:fillColor="#D78FA0"
                  android:pathData="M36,10c-5,0 -8,4 -8,9c0,8 2,15 7,20c2,2 5,2 7,0c2,-2 2,-5 0,-7c-3,-3 -4,-7 -4,-13c0,-4 -1,-9 -2,-9z"/>
              <path
                  android:fillColor="#D78FA0"
                  android:pathData="M72,10c-5,0 -8,5 -8,9c0,6 -1,10 -4,13c-2,2 -2,5 0,7c2,2 5,2 7,0c5,-5 7,-12 7,-20c0,-4 -3,-9 -2,-9z"/>
              <path
                  android:fillColor="#FFFFFF"
                  android:pathData="M45,48a3,3 0 1,1 0,6a3,3 0 1,1 0,-6z"/>
              <path
                  android:fillColor="#FFFFFF"
                  android:pathData="M63,48a3,3 0 1,1 0,6a3,3 0 1,1 0,-6z"/>
              <path
                  android:fillColor="#F7B8C8"
                  android:pathData="M50,58c0,-2 2,-3 4,-3c2,0 4,1 4,3c0,2 -2,4 -4,4c-2,0 -4,-2 -4,-4z"/>
          </vector>
          EOF

          cat <<EOF > app/src/main/res/mipmap-anydpi-v26/ic_launcher.xml
          <adaptive-icon xmlns:android="http://schemas.android.com/apk/res/android">
              <background android:drawable="@drawable/splash_bg"/>
              <foreground android:drawable="@drawable/ic_launcher_foreground"/>
          </adaptive-icon>
          EOF

          cat <<'EOF' > app/src/main/java/com/trine/kanin/MainActivity.java
          package com.trine.kanin;

          import android.app.Activity;
          import android.app.AlertDialog;
          import android.content.SharedPreferences;
          import android.graphics.Color;
          import android.graphics.Typeface;
          import android.graphics.drawable.GradientDrawable;
          import android.os.Bundle;
          import android.text.Editable;
          import android.text.TextWatcher;
          import android.util.TypedValue;
          import android.view.Gravity;
          import android.view.View;
          import android.view.ViewGroup;
          import android.widget.ArrayAdapter;
          import android.widget.Button;
          import android.widget.EditText;
          import android.widget.HorizontalScrollView;
          import android.widget.LinearLayout;
          import android.widget.ScrollView;
          import android.widget.Spinner;
          import android.widget.TextView;

          import java.util.ArrayList;
          import java.util.Arrays;
          import java.util.Collections;
          import java.util.Comparator;
          import java.util.HashMap;
          import java.util.List;
          import java.util.Locale;
          import java.util.Map;

          public class MainActivity extends Activity {

              private LinearLayout contentLayout;
              private LinearLayout suggestionBox;
              private EditText searchInput;
              private final List<RabbitBreed> breeds = new ArrayList<>();
              private String currentQuery = "";
              private String currentSizeFilter = "Alle";
              private boolean favoritesOnly = false;
              private SharedPreferences prefs;

              private final int BG = Color.parseColor("#FFF9F5");
              private final int CARD = Color.parseColor("#FFFFFF");
              private final int TITLE = Color.parseColor("#2F2A2A");
              private final int TEXT = Color.parseColor("#5B5451");
              private final int PINK = Color.parseColor("#F9DDE3");
              private final int PEACH = Color.parseColor("#FDE8D7");
              private final int SAGE = Color.parseColor("#E4F0E8");
              private final int SAND = Color.parseColor("#F3ECE3");
              private final int LAV = Color.parseColor("#EEE7F8");
              private final int ACCENT = Color.parseColor("#B96E7B");
              private final int GOLD = Color.parseColor("#FFF0B8");
              private final int BORDER = Color.parseColor("#E9DED3");
              private final int PURPLE_BOX = Color.parseColor("#F6F0FF");
              private final int PURPLE_BORDER = Color.parseColor("#E3D9F4");
              private final int GOLD_BORDER = Color.parseColor("#E0C56E");
              private final int RESULT_BG = Color.parseColor("#FFFDF5");

              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);

                  prefs = getSharedPreferences("kaninguide", MODE_PRIVATE);
                  seedData();

                  ScrollView scrollView = new ScrollView(this);
                  scrollView.setBackgroundColor(BG);

                  LinearLayout root = new LinearLayout(this);
                  root.setOrientation(LinearLayout.VERTICAL);
                  root.setPadding(dp(16), dp(16), dp(16), dp(28));

                  LinearLayout hero = new LinearLayout(this);
                  hero.setOrientation(LinearLayout.VERTICAL);
                  hero.setPadding(dp(18), dp(18), dp(18), dp(18));
                  hero.setBackground(makeRounded(CARD, 28, BORDER, 2));

                  TextView title = new TextView(this);
                  title.setText("Kaninguide");
                  title.setTextSize(TypedValue.COMPLEX_UNIT_SP, 34);
                  title.setTypeface(Typeface.DEFAULT_BOLD);
                  title.setTextColor(TITLE);
                  hero.addView(title);

                  TextView subtitle = new TextView(this);
                  subtitle.setText("Søk, filtrer og sammenlign kaninraser, farger, temperament, reproduksjon og stell.");
                  subtitle.setTextSize(TypedValue.COMPLEX_UNIT_SP, 16);
                  subtitle.setTextColor(TEXT);
                  subtitle.setPadding(0, dp(8), 0, 0);
                  hero.addView(subtitle);

                  root.addView(hero, matchWrap(dp(12)));

                  searchInput = new EditText(this);
                  searchInput.setHint("🔎 Søk etter rase, farge, temperament...");
                  searchInput.setSingleLine(true);
                  searchInput.setTextSize(TypedValue.COMPLEX_UNIT_SP, 16);
                  searchInput.setPadding(dp(16), dp(14), dp(16), dp(14));
                  searchInput.setTextColor(TITLE);
                  searchInput.setHintTextColor(Color.parseColor("#9C918A"));
                  searchInput.setBackground(makeRounded(CARD, 22, ACCENT, 2));
                  root.addView(searchInput, matchWrap(dp(8)));

                  suggestionBox = new LinearLayout(this);
                  suggestionBox.setOrientation(LinearLayout.VERTICAL);
                  suggestionBox.setBackground(makeRounded(Color.parseColor("#FFF7FB"), 20, BORDER, 2));
                  suggestionBox.setPadding(dp(12), dp(8), dp(12), dp(8));
                  suggestionBox.setVisibility(View.GONE);
                  root.addView(suggestionBox, matchWrap(dp(12)));

                  HorizontalScrollView hsv = new HorizontalScrollView(this);
                  hsv.setHorizontalScrollBarEnabled(false);
                  LinearLayout filterRow = new LinearLayout(this);
                  filterRow.setOrientation(LinearLayout.HORIZONTAL);
                  filterRow.setPadding(0, 0, dp(24), 0);
                  hsv.addView(filterRow);
                  root.addView(hsv, matchWrap(dp(12)));

                  String[] filters = new String[]{"Alle", "Liten", "Mellomstor", "Stor", "Favoritter"};
                  for (String filter : filters) {
                      Button btn = new Button(this);
                      btn.setText(filter);
                      btn.setAllCaps(false);
                      styleFilterButton(btn, false);

                      LinearLayout.LayoutParams lp = new LinearLayout.LayoutParams(
                              ViewGroup.LayoutParams.WRAP_CONTENT,
                              ViewGroup.LayoutParams.WRAP_CONTENT
                      );
                      lp.rightMargin = dp(8);
                      btn.setLayoutParams(lp);

                      btn.setOnClickListener(v -> {
                          if (filter.equals("Favoritter")) {
                              favoritesOnly = !favoritesOnly;
                          } else {
                              currentSizeFilter = filter;
                          }
                          updateFilterButtons(filterRow);
                          render();
                      });

                      filterRow.addView(btn);
                  }

                  contentLayout = new LinearLayout(this);
                  contentLayout.setOrientation(LinearLayout.VERTICAL);
                  root.addView(contentLayout);

                  scrollView.addView(root);
                  setContentView(scrollView);

                  updateFilterButtons(filterRow);
                  render();

                  searchInput.addTextChangedListener(new TextWatcher() {
                      @Override public void beforeTextChanged(CharSequence s, int start, int count, int after) {}
                      @Override public void afterTextChanged(Editable s) {}
                      @Override
                      public void onTextChanged(CharSequence s, int start, int before, int count) {
                          currentQuery = s.toString();
                          updateSuggestions();
                          render();
                      }
                  });
              }

              private void updateSuggestions() {
                  suggestionBox.removeAllViews();

                  String q = currentQuery == null ? "" : currentQuery.trim().toLowerCase(Locale.ROOT);
                  if (q.isEmpty()) {
                      suggestionBox.setVisibility(View.GONE);
                      return;
                  }

                  List<RabbitBreed> suggestions = getSuggestions(q);
                  if (suggestions.isEmpty()) {
                      suggestionBox.setVisibility(View.GONE);
                      return;
                  }

                  suggestionBox.setVisibility(View.VISIBLE);

                  int count = Math.min(5, suggestions.size());
                  for (int i = 0; i < count; i++) {
                      RabbitBreed breed = suggestions.get(i);

                      TextView row = new TextView(this);
                      row.setText("• " + breed.name + "  (" + breed.size + ")");
                      row.setTextSize(TypedValue.COMPLEX_UNIT_SP, 16);
                      row.setTextColor(TITLE);
                      row.setPadding(dp(6), dp(10), dp(6), dp(10));
                      row.setOnClickListener(v -> {
                          searchInput.setText(breed.name);
                          searchInput.setSelection(breed.name.length());
                          suggestionBox.setVisibility(View.GONE);
                          showBreedDetail(breed);
                      });

                      suggestionBox.addView(row);
                  }
              }

              private void render() {
                  contentLayout.removeAllViews();

                  addInfoCard(
                          "🐇 Farger og avl – enkelt forklart",
                          new String[]{
                                  "Blå + blå gir ofte blå unger.",
                                  "Hvit rødøyd kan skjule andre farger.",
                                  "Viltgrå kan gi flere variasjoner.",
                                  "Like foreldre kan fortsatt gi ulike farger hvis de bærer skjulte gener."
                          },
                          PEACH
                  );

                  addQuizCard();
                  addColorCalculatorCard();

                  List<RabbitBreed> favorites = new ArrayList<>();
                  List<RabbitBreed> normal = new ArrayList<>();

                  String q = currentQuery == null ? "" : currentQuery.trim().toLowerCase(Locale.ROOT);

                  for (RabbitBreed breed : breeds) {
                      boolean sizeOk = currentSizeFilter.equals("Alle") || breed.size.equalsIgnoreCase(currentSizeFilter);
                      boolean queryOk = q.isEmpty() || breed.searchText().contains(q);
                      boolean favOk = !favoritesOnly || isFavorite(breed.name);

                      if (sizeOk && queryOk && favOk) {
                          if (isFavorite(breed.name)) favorites.add(breed);
                          else normal.add(breed);
                      }
                  }

                  if (!favorites.isEmpty()) {
                      addMiniHeadline("Favoritter ⭐");
                      for (RabbitBreed breed : favorites) {
                          contentLayout.addView(createBreedCard(breed, true));
                      }
                  }

                  addMiniHeadline("Raser");
                  for (RabbitBreed breed : normal) {
                      contentLayout.addView(createBreedCard(breed, false));
                  }

                  if (favorites.isEmpty() && normal.isEmpty()) {
                      LinearLayout empty = new LinearLayout(this);
                      empty.setOrientation(LinearLayout.VERTICAL);
                      empty.setPadding(dp(18), dp(18), dp(18), dp(18));
                      empty.setBackground(makeRounded(CARD, 24, BORDER, 2));

                      TextView tv = new TextView(this);
                      tv.setText("Ingen treff på søket ditt.");
                      tv.setTextSize(TypedValue.COMPLEX_UNIT_SP, 20);
                      tv.setTypeface(Typeface.DEFAULT_BOLD);
                      tv.setTextColor(TITLE);
                      empty.addView(tv);

                      TextView hint = new TextView(this);
                      hint.setText("Prøv ord som rolig, hvit, stor, pels, familiekanin eller vedder.");
                      hint.setTextSize(TypedValue.COMPLEX_UNIT_SP, 15);
                      hint.setTextColor(TEXT);
                      hint.setPadding(0, dp(8), 0, 0);
                      empty.addView(hint);

                      contentLayout.addView(empty, matchWrap(dp(12)));
                  }
              }

              private void addQuizCard() {
                  LinearLayout card = new LinearLayout(this);
                  card.setOrientation(LinearLayout.VERTICAL);
                  card.setPadding(dp(16), dp(16), dp(16), dp(16));
                  card.setBackground(makeRounded(Color.parseColor("#FFF6FB"), 24, Color.parseColor("#F0D8E7"), 2));

                  TextView title = new TextView(this);
                  title.setText("Hvilken rase passer meg?");
                  title.setTextSize(TypedValue.COMPLEX_UNIT_SP, 22);
                  title.setTypeface(Typeface.DEFAULT_BOLD);
                  title.setTextColor(TITLE);
                  card.addView(title);

                  TextView desc = new TextView(this);
                  desc.setText("Velg det som passer best, og få topp 3 forslag.");
                  desc.setTextSize(TypedValue.COMPLEX_UNIT_SP, 15);
                  desc.setTextColor(TEXT);
                  desc.setPadding(0, dp(6), 0, dp(10));
                  card.addView(desc);

                  Spinner sizeSpinner = new Spinner(this);
                  sizeSpinner.setAdapter(new ArrayAdapter<>(this, android.R.layout.simple_spinner_dropdown_item,
                          Arrays.asList("Liten", "Mellomstor", "Stor")));
                  card.addView(sizeSpinner);

                  Spinner temperSpinner = new Spinner(this);
                  temperSpinner.setAdapter(new ArrayAdapter<>(this, android.R.layout.simple_spinner_dropdown_item,
                          Arrays.asList("Rolig", "Aktiv", "Familievennlig", "Mye stell")));
                  LinearLayout.LayoutParams temperLp = matchWrap(0);
                  temperLp.topMargin = dp(10);
                  card.addView(temperSpinner, temperLp);

                  Spinner careSpinner = new Spinner(this);
                  careSpinner.setAdapter(new ArrayAdapter<>(this, android.R.layout.simple_spinner_dropdown_item,
                          Arrays.asList("Lite stell", "Middels", "Mye stell")));
                  LinearLayout.LayoutParams careLp = matchWrap(0);
                  careLp.topMargin = dp(10);
                  card.addView(careSpinner, careLp);

                  Button btn = new Button(this);
                  btn.setText("Vis topp 3");
                  btn.setAllCaps(false);
                  btn.setBackground(makeRounded(ACCENT, 18, ACCENT, 0));
                  btn.setTextColor(Color.WHITE);
                  LinearLayout.LayoutParams btnLp = matchWrap(0);
                  btnLp.topMargin = dp(12);
                  card.addView(btn, btnLp);

                  TextView result = new TextView(this);
                  result.setText("Ingen anbefaling valgt ennå.");
                  result.setTextSize(TypedValue.COMPLEX_UNIT_SP, 16);
                  result.setTextColor(TEXT);
                  result.setPadding(dp(12), dp(12), dp(12), dp(12));
                  result.setBackground(makeRounded(RESULT_BG, 18, BORDER, 2));
                  LinearLayout.LayoutParams resultLp = matchWrap(0);
                  resultLp.topMargin = dp(12);
                  card.addView(result, resultLp);

                  btn.setOnClickListener(v -> {
                      String s = sizeSpinner.getSelectedItem().toString();
                      String t = temperSpinner.getSelectedItem().toString();
                      String c = careSpinner.getSelectedItem().toString();
                      result.setText(getTop3Result(s, t, c));
                  });

                  contentLayout.addView(card, matchWrap(dp(14)));
              }

              private void addColorCalculatorCard() {
                  LinearLayout card = new LinearLayout(this);
                  card.setOrientation(LinearLayout.VERTICAL);
                  card.setPadding(dp(16), dp(16), dp(16), dp(16));
                  card.setBackground(makeRounded(PURPLE_BOX, 24, PURPLE_BORDER, 2));

                  TextView title = new TextView(this);
                  title.setText("Bedre fargekalkulator");
                  title.setTextSize(TypedValue.COMPLEX_UNIT_SP, 22);
                  title.setTypeface(Typeface.DEFAULT_BOLD);
                  title.setTextColor(TITLE);
                  card.addView(title);

                  TextView desc = new TextView(this);
                  desc.setText("Velg farge på mor og far for å få flere mulige utfall.");
                  desc.setTextSize(TypedValue.COMPLEX_UNIT_SP, 15);
                  desc.setTextColor(TEXT);
                  desc.setPadding(0, dp(6), 0, dp(10));
                  card.addView(desc);

                  List<String> colors = Arrays.asList("Blå", "Hvit rødøyd", "Viltgrå", "Svart", "Japaner");

                  Spinner mother = new Spinner(this);
                  mother.setAdapter(new ArrayAdapter<>(this, android.R.layout.simple_spinner_dropdown_item, colors));
                  card.addView(mother);

                  Spinner father = new Spinner(this);
                  father.setAdapter(new ArrayAdapter<>(this, android.R.layout.simple_spinner_dropdown_item, colors));
                  LinearLayout.LayoutParams fatherLp = matchWrap(0);
                  fatherLp.topMargin = dp(10);
                  card.addView(father, fatherLp);

                  Button btn = new Button(this);
                  btn.setText("Beregn");
                  btn.setAllCaps(false);
                  btn.setBackground(makeRounded(Color.parseColor("#7C6ACF"), 18, Color.parseColor("#7C6ACF"), 0));
                  btn.setTextColor(Color.WHITE);
                  LinearLayout.LayoutParams btnLp = matchWrap(0);
                  btnLp.topMargin = dp(12);
                  card.addView(btn, btnLp);

                  TextView result = new TextView(this);
                  result.setText("Ingen beregning ennå.");
                  result.setTextSize(TypedValue.COMPLEX_UNIT_SP, 16);
                  result.setTextColor(TEXT);
                  result.setPadding(dp(12), dp(12), dp(12), dp(12));
                  result.setBackground(makeRounded(RESULT_BG, 18, BORDER, 2));
                  LinearLayout.LayoutParams resultLp = matchWrap(0);
                  resultLp.topMargin = dp(12);
                  card.addView(result, resultLp);

                  btn.setOnClickListener(v -> {
                      String m = mother.getSelectedItem().toString();
                      String f = father.getSelectedItem().toString();
                      result.setText(getBetterColorResult(m, f));
                  });

                  contentLayout.addView(card, matchWrap(dp(14)));
              }

              private String getTop3Result(String size, String temper, String care) {
                  Map<String, Integer> scores = new HashMap<>();
                  for (RabbitBreed b : breeds) scores.put(b.name, 0);

                  for (RabbitBreed b : breeds) {
                      int score = 0;

                      if (b.size.equals(size)) score += 3;
                      if (b.tag.toLowerCase(Locale.ROOT).contains(temper.toLowerCase(Locale.ROOT))) score += 3;
                      if (temper.equals("Familievennlig") && b.tag.toLowerCase(Locale.ROOT).contains("familie")) score += 2;
                      if (temper.equals("Rolig") && b.temperament.toLowerCase(Locale.ROOT).contains("rolig")) score += 2;
                      if (temper.equals("Aktiv") && b.temperament.toLowerCase(Locale.ROOT).contains("aktiv")) score += 2;
                      if (care.equals("Mye stell") && b.tag.toLowerCase(Locale.ROOT).contains("stell")) score += 2;
                      if (care.equals("Lite stell") && !b.tag.toLowerCase(Locale.ROOT).contains("stell")) score += 1;

                      scores.put(b.name, score);
                  }

                  List<Map.Entry<String, Integer>> list = new ArrayList<>(scores.entrySet());
                  Collections.sort(list, (a, b) -> b.getValue().compareTo(a.getValue()));

                  StringBuilder sb = new StringBuilder();
                  sb.append("Topp 3 forslag:\n");
                  for (int i = 0; i < Math.min(3, list.size()); i++) {
                      String name = list.get(i).getKey();
                      RabbitBreed breed = findBreed(name);
                      sb.append(i + 1).append(". ").append(name);
                      if (breed != null) {
                          sb.append(" – ").append(breed.tag);
                      }
                      sb.append("\n");
                  }
                  return sb.toString().trim();
              }

              private String getBetterColorResult(String mother, String father) {
                  if (mother.equals("Blå") && father.equals("Blå")) {
                      return "Mulige utfall:\n• Blå\n• Hovedsakelig blå avkom\n• Fortsatt avhengig av skjulte gener";
                  }
                  if (mother.equals("Hvit rødøyd") || father.equals("Hvit rødøyd")) {
                      return "Mulige utfall:\n• Hvit rødøyd\n• Andre skjulte farger kan dukke opp\n• Denne kombinasjonen er mindre forutsigbar";
                  }
                  if (mother.equals("Viltgrå") && father.equals("Viltgrå")) {
                      return "Mulige utfall:\n• Viltgrå\n• Mørkere variasjoner\n• Andre nyanser hvis foreldrene bærer skjulte gener";
                  }
                  if (mother.equals("Svart") && father.equals("Svart")) {
                      return "Mulige utfall:\n• Svart\n• Mørke variasjoner\n• Skjulte gener kan påvirke";
                  }
                  if (mother.equals("Japaner") || father.equals("Japaner")) {
                      return "Mulige utfall:\n• Japaner-tegninger\n• Ulike markeringer\n• Vanskelig å forutsi helt nøyaktig";
                  }
                  return "Mulige utfall:\n• Flere varianter\n• Blanding av foreldrefarger\n• Resultatet er kun veiledende";
              }

              private RabbitBreed findBreed(String name) {
                  for (RabbitBreed b : breeds) {
                      if (b.name.equals(name)) return b;
                  }
                  return null;
              }

              private List<RabbitBreed> getSuggestions(String query) {
                  List<RabbitBreed> out = new ArrayList<>();
                  String q = query == null ? "" : query.trim().toLowerCase(Locale.ROOT);
                  if (q.isEmpty()) return out;

                  for (RabbitBreed breed : breeds) {
                      if (breed.searchText().contains(q)) {
                          out.add(breed);
                      }
                  }

                  Collections.sort(out, Comparator.comparing(a -> a.name));
                  return out;
              }

              private void addMiniHeadline(String text) {
                  TextView tv = new TextView(this);
                  tv.setText(text);
                  tv.setTextSize(TypedValue.COMPLEX_UNIT_SP, 20);
                  tv.setTypeface(Typeface.DEFAULT_BOLD);
                  tv.setTextColor(TITLE);
                  tv.setPadding(dp(4), dp(8), dp(4), dp(8));
                  contentLayout.addView(tv);
              }

              private LinearLayout createBreedCard(RabbitBreed breed, boolean favorite) {
                  LinearLayout card = new LinearLayout(this);
                  card.setOrientation(LinearLayout.VERTICAL);
                  card.setPadding(dp(18), dp(18), dp(18), dp(18));
                  card.setBackground(makeRounded(CARD, 26, BORDER, 2));

                  LinearLayout top = new LinearLayout(this);
                  top.setOrientation(LinearLayout.HORIZONTAL);

                  LinearLayout left = new LinearLayout(this);
                  left.setOrientation(LinearLayout.VERTICAL);
                  LinearLayout.LayoutParams leftLp = new LinearLayout.LayoutParams(0, ViewGroup.LayoutParams.WRAP_CONTENT, 1f);
                  left.setLayoutParams(leftLp);

                  TextView title = new TextView(this);
                  title.setText(breed.name);
                  title.setTextSize(TypedValue.COMPLEX_UNIT_SP, 26);
                  title.setTypeface(Typeface.DEFAULT_BOLD);
                  title.setTextColor(TITLE);
                  title.setOnClickListener(v -> showBreedDetail(breed));
                  left.addView(title);

                  TextView meta = new TextView(this);
                  meta.setText(breed.size + " • " + breed.weight);
                  meta.setTextSize(TypedValue.COMPLEX_UNIT_SP, 15);
                  meta.setTextColor(TEXT);
                  meta.setPadding(0, dp(6), 0, dp(8));
                  left.addView(meta);

                  LinearLayout badges = new LinearLayout(this);
                  badges.setOrientation(LinearLayout.HORIZONTAL);
                  badges.addView(makeBadge(breed.size, LAV));
                  badges.addView(makeBadge(breed.tag, favorite ? PINK : SAGE));
                  left.addView(badges);

                  top.addView(left);

                  Button fav = new Button(this);
                  fav.setAllCaps(false);
                  fav.setText(favorite ? "★" : "☆");
                  fav.setTextSize(TypedValue.COMPLEX_UNIT_SP, 18);
                  fav.setBackground(makeRounded(GOLD, 18, GOLD_BORDER, 2));
                  fav.setTextColor(Color.parseColor("#8A5B00"));
                  fav.setOnClickListener(v -> {
                      toggleFavorite(breed.name);
                      render();
                  });
                  top.addView(fav);

                  card.addView(top);

                  LinearLayout imageHolder = new LinearLayout(this);
                  imageHolder.setOrientation(LinearLayout.VERTICAL);
                  imageHolder.setGravity(Gravity.CENTER);
                  imageHolder.setBackground(makeRounded(Color.parseColor("#FFF6FB"), 18, BORDER, 2));
                  imageHolder.setPadding(dp(12), dp(20), dp(12), dp(20));
                  LinearLayout.LayoutParams imgLp = matchWrap(0);
                  imgLp.topMargin = dp(12);
                  imageHolder.setLayoutParams(imgLp);

                  TextView bunny = new TextView(this);
                  bunny.setText("🐇");
                  bunny.setTextSize(TypedValue.COMPLEX_UNIT_SP, 34);
                  bunny.setGravity(Gravity.CENTER);
                  imageHolder.addView(bunny);

                  TextView imgText = new TextView(this);
                  imgText.setText("Bildeplassholder for " + breed.name);
                  imgText.setTextSize(TypedValue.COMPLEX_UNIT_SP, 14);
                  imgText.setTextColor(TEXT);
                  imgText.setPadding(0, dp(8), 0, 0);
                  imageHolder.addView(imgText);

                  card.addView(imageHolder);

                  Button details = new Button(this);
                  details.setText("Åpne detaljside");
                  details.setAllCaps(false);
                  details.setBackground(makeRounded(Color.parseColor("#F7F1EB"), 16, BORDER, 2));
                  details.setTextColor(TITLE);
                  LinearLayout.LayoutParams detailsLp = matchWrap(0);
                  detailsLp.topMargin = dp(10);
                  card.addView(details, detailsLp);
                  details.setOnClickListener(v -> showBreedDetail(breed));

                  addLabelValue(card, "Temperament", breed.temperament);
                  addLabelValue(card, "Vanlige farger", breed.colors);
                  addLabelValue(card, "Reproduksjon", breed.reproduction);

                  addBox(card, "Fordeler", breed.pros, SAGE);
                  addBox(card, "Ulemper", breed.cons, PINK);
                  addBox(card, "Hva rasen krever", breed.needs, SAND);

                  return card;
              }

              private void showBreedDetail(RabbitBreed breed) {
                  LinearLayout wrapper = new LinearLayout(this);
                  wrapper.setOrientation(LinearLayout.VERTICAL);
                  wrapper.setPadding(dp(10), dp(10), dp(10), dp(10));

                  LinearLayout imageHolder = new LinearLayout(this);
                  imageHolder.setOrientation(LinearLayout.VERTICAL);
                  imageHolder.setGravity(Gravity.CENTER);
                  imageHolder.setBackground(makeRounded(Color.parseColor("#FFF6FB"), 18, BORDER, 2));
                  imageHolder.setPadding(dp(12), dp(20), dp(12), dp(20));

                  TextView bunny = new TextView(this);
                  bunny.setText("🐇");
                  bunny.setTextSize(TypedValue.COMPLEX_UNIT_SP, 38);
                  bunny.setGravity(Gravity.CENTER);
                  imageHolder.addView(bunny);

                  TextView imgText = new TextView(this);
                  imgText.setText("Bildeplassholder");
                  imgText.setTextSize(TypedValue.COMPLEX_UNIT_SP, 14);
                  imgText.setTextColor(TEXT);
                  imgText.setPadding(0, dp(8), 0, 0);
                  imageHolder.addView(imgText);

                  wrapper.addView(imageHolder);

                  TextView info = new TextView(this);
                  info.setText(
                          "Størrelse: " + breed.size + "\n" +
                          "Vekt: " + breed.weight + "\n\n" +
                          "Temperament:\n" + breed.temperament + "\n\n" +
                          "Vanlige farger:\n" + breed.colors + "\n\n" +
                          "Reproduksjon:\n" + breed.reproduction + "\n\n" +
                          "Fordeler:\n" + breed.pros + "\n\n" +
                          "Ulemper:\n" + breed.cons + "\n\n" +
                          "Hva rasen krever:\n" + breed.needs
                  );
                  info.setTextSize(TypedValue.COMPLEX_UNIT_SP, 16);
                  info.setTextColor(TITLE);
                  info.setPadding(0, dp(14), 0, 0);
                  wrapper.addView(info);

                  new AlertDialog.Builder(this)
                          .setTitle(breed.name)
                          .setView(wrapper)
                          .setPositiveButton("Lukk", null)
                          .show();
              }

              private View makeBadge(String text, int bg) {
                  TextView tv = new TextView(this);
                  tv.setText(text);
                  tv.setTextSize(TypedValue.COMPLEX_UNIT_SP, 13);
                  tv.setTextColor(TITLE);
                  tv.setPadding(dp(10), dp(6), dp(10), dp(6));
                  tv.setBackground(makeRounded(bg, 18, 0, 0));

                  LinearLayout.LayoutParams lp = new LinearLayout.LayoutParams(
                          ViewGroup.LayoutParams.WRAP_CONTENT,
                          ViewGroup.LayoutParams.WRAP_CONTENT
                  );
                  lp.rightMargin = dp(8);
                  tv.setLayoutParams(lp);
                  return tv;
              }

              private void addLabelValue(LinearLayout parent, String label, String value) {
                  TextView l = new TextView(this);
                  l.setText(label);
                  l.setTextSize(TypedValue.COMPLEX_UNIT_SP, 17);
                  l.setTypeface(Typeface.DEFAULT_BOLD);
                  l.setTextColor(TITLE);
                  l.setPadding(0, dp(12), 0, dp(4));
                  parent.addView(l);

                  TextView v = new TextView(this);
                  v.setText(value);
                  v.setTextSize(TypedValue.COMPLEX_UNIT_SP, 16);
                  v.setTextColor(TEXT);
                  parent.addView(v);
              }

              private void addBox(LinearLayout parent, String titleText, String body, int bgColor) {
                  LinearLayout box = new LinearLayout(this);
                  box.setOrientation(LinearLayout.VERTICAL);
                  box.setBackground(makeRounded(bgColor, 20, 0, 0));
                  box.setPadding(dp(14), dp(14), dp(14), dp(14));

                  LinearLayout.LayoutParams lp = new LinearLayout.LayoutParams(
                          ViewGroup.LayoutParams.MATCH_PARENT,
                          ViewGroup.LayoutParams.WRAP_CONTENT
                  );
                  lp.topMargin = dp(12);
                  box.setLayoutParams(lp);

                  TextView title = new TextView(this);
                  title.setText(titleText);
                  title.setTextSize(TypedValue.COMPLEX_UNIT_SP, 17);
                  title.setTypeface(Typeface.DEFAULT_BOLD);
                  title.setTextColor(TITLE);
                  box.addView(title);

                  TextView text = new TextView(this);
                  text.setText(body);
                  text.setTextSize(TypedValue.COMPLEX_UNIT_SP, 16);
                  text.setTextColor(TEXT);
                  text.setPadding(0, dp(8), 0, 0);
                  box.addView(text);

                  parent.addView(box);
              }

              private void addInfoCard(String heading, String[] lines, int bgColor) {
                  LinearLayout box = new LinearLayout(this);
                  box.setOrientation(LinearLayout.VERTICAL);
                  box.setBackground(makeRounded(bgColor, 24, BORDER, 0));
                  box.setPadding(dp(16), dp(16), dp(16), dp(16));

                  TextView title = new TextView(this);
                  title.setText(heading);
                  title.setTextSize(TypedValue.COMPLEX_UNIT_SP, 21);
                  title.setTypeface(Typeface.DEFAULT_BOLD);
                  title.setTextColor(TITLE);
                  box.addView(title);

                  for (String line : lines) {
                      TextView tv = new TextView(this);
                      tv.setText("• " + line);
                      tv.setTextSize(TypedValue.COMPLEX_UNIT_SP, 16);
                      tv.setTextColor(TEXT);
                      tv.setPadding(0, dp(8), 0, 0);
                      box.addView(tv);
                  }

                  contentLayout.addView(box, matchWrap(dp(14)));
              }

              private GradientDrawable makeRounded(int color, int radiusDp, int strokeColor, int strokeDp) {
                  GradientDrawable d = new GradientDrawable();
                  d.setColor(color);
                  d.setCornerRadius(dp(radiusDp));
                  if (strokeDp > 0) d.setStroke(dp(strokeDp), strokeColor);
                  return d;
              }

              private LinearLayout.LayoutParams matchWrap(int bottomMarginDp) {
                  LinearLayout.LayoutParams lp = new LinearLayout.LayoutParams(
                          ViewGroup.LayoutParams.MATCH_PARENT,
                          ViewGroup.LayoutParams.WRAP_CONTENT
                  );
                  lp.bottomMargin = dp(bottomMarginDp);
                  return lp;
              }

              private void styleFilterButton(Button btn, boolean active) {
                  btn.setAllCaps(false);
                  btn.setTextSize(TypedValue.COMPLEX_UNIT_SP, 14);
                  btn.setPadding(dp(14), dp(10), dp(14), dp(10));
                  if (active) {
                      btn.setBackground(makeRounded(ACCENT, 18, 0, 0));
                      btn.setTextColor(Color.WHITE);
                  } else {
                      btn.setBackground(makeRounded(CARD, 18, BORDER, 2));
                      btn.setTextColor(TITLE);
                  }
              }

              private void updateFilterButtons(LinearLayout row) {
                  for (int i = 0; i < row.getChildCount(); i++) {
                      View child = row.getChildAt(i);
                      if (child instanceof Button) {
                          Button btn = (Button) child;
                          String t = btn.getText().toString();
                          boolean active = t.equals(currentSizeFilter) || (t.equals("Favoritter") && favoritesOnly);
                          styleFilterButton(btn, active);
                      }
                  }
              }

              private boolean isFavorite(String name) {
                  return prefs.getBoolean("fav_" + name, false);
              }

              private void toggleFavorite(String name) {
                  boolean current = isFavorite(name);
                  prefs.edit().putBoolean("fav_" + name, !current).apply();
              }

              private int dp(int value) {
                  float density = getResources().getDisplayMetrics().density;
                  return Math.round(value * density);
              }

