name: Build APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Create project
        run: |
          mkdir -p app/src/main/java/com/trine/kanin
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/drawable
          mkdir -p app/src/main/res/mipmap-anydpi-v26

          echo "android.useAndroidX=true" > gradle.properties

          cat <<EOF > settings.gradle
          pluginManagement {
            repositories {
              google()
              mavenCentral()
              gradlePluginPortal()
            }
          }
          dependencyResolutionManagement {
            repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
            repositories {
              google()
              mavenCentral()
            }
          }
          rootProject.name="app"
          include(":app")
          EOF

          cat <<EOF > build.gradle
          plugins {
            id 'com.android.application' version '8.2.2' apply false
          }
          EOF

          cat <<EOF > app/build.gradle
          plugins {
            id 'com.android.application'
          }

          android {
            namespace "com.trine.kanin"
            compileSdk 34

            defaultConfig {
              applicationId "com.trine.kanin"
              minSdk 24
              targetSdk 34
              versionCode 161
              versionName "16.1"
            }

            buildTypes {
              release {
                minifyEnabled false
              }
            }

            compileOptions {
              sourceCompatibility JavaVersion.VERSION_17
              targetCompatibility JavaVersion.VERSION_17
            }
          }
          EOF

          cat <<EOF > app/src/main/AndroidManifest.xml
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <application
                  android:label="Kaninguide"
                  android:icon="@mipmap/ic_launcher"
                  android:roundIcon="@mipmap/ic_launcher"
                  android:theme="@style/AppTheme">
                  <activity
                      android:name=".DetailActivity"
                      android:exported="false" />
                  <activity
                      android:name=".MainActivity"
                      android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

          cat <<EOF > app/src/main/res/values/strings.xml
          <resources>
              <string name="app_name">Kaninguide</string>
          </resources>
          EOF

          cat <<EOF > app/src/main/res/values/themes.xml
          <resources>
              <style name="AppTheme" parent="@android:style/Theme.Material.Light.NoActionBar">
                  <item name="android:windowBackground">@drawable/splash_bg</item>
              </style>
          </resources>
          EOF

          cat <<EOF > app/src/main/res/drawable/splash_bg.xml
          <layer-list xmlns:android="http://schemas.android.com/apk/res/android">
              <item>
                  <shape android:shape="rectangle">
                      <solid android:color="#FFF9F5"/>
                  </shape>
              </item>
          </layer-list>
          EOF

          cat <<EOF > app/src/main/res/drawable/ic_launcher_foreground.xml
          <vector xmlns:android="http://schemas.android.com/apk/res/android"
              android:width="108dp"
              android:height="108dp"
              android:viewportWidth="108"
              android:viewportHeight="108">
              <path android:fillColor="#FFF9F5" android:pathData="M0,0h108v108h-108z"/>
              <path android:fillColor="#B96E7B" android:pathData="M54,24c-15,0 -27,10 -27,24c0,12 8,21 18,25l0,9l18,0l0,-9c10,-4 18,-13 18,-25c0,-14 -12,-24 -27,-24z"/>
              <path android:fillColor="#D78FA0" android:pathData="M36,11c-5,0 -8,4 -8,9c0,8 2,15 7,20c2,2 5,2 7,0c2,-2 2,-5 0,-7c-3,-3 -4,-7 -4,-13c0,-4 -1,-9 -2,-9z"/>
              <path android:fillColor="#D78FA0" android:pathData="M72,11c-5,0 -8,5 -8,9c0,6 -1,10 -4,13c-2,2 -2,5 0,7c2,2 5,2 7,0c5,-5 7,-12 7,-20c0,-4 -3,-9 -2,-9z"/>
              <path android:fillColor="#FFFFFF" android:pathData="M45,49a3,3 0 1,1 0,6a3,3 0 1,1 0,-6z"/>
              <path android:fillColor="#FFFFFF" android:pathData="M63,49a3,3 0 1,1 0,6a3,3 0 1,1 0,-6z"/>
              <path android:fillColor="#F7B8C8" android:pathData="M50,59c0,-2 2,-3 4,-3c2,0 4,1 4,3c0,2 -2,4 -4,4c-2,0 -4,-2 -4,-4z"/>
          </vector>
          EOF

          cat <<EOF > app/src/main/res/mipmap-anydpi-v26/ic_launcher.xml
          <adaptive-icon xmlns:android="http://schemas.android.com/apk/res/android">
              <background android:drawable="@drawable/splash_bg"/>
              <foreground android:drawable="@drawable/ic_launcher_foreground"/>
          </adaptive-icon>
          EOF

          cat <<'EOF' > app/src/main/java/com/trine/kanin/MainActivity.java
          package com.trine.kanin;

          import android.app.Activity;
          import android.content.Intent;
          import android.content.SharedPreferences;
          import android.graphics.Color;
          import android.graphics.Typeface;
          import android.graphics.drawable.GradientDrawable;
          import android.os.Bundle;
          import android.text.Editable;
          import android.text.TextWatcher;
          import android.util.TypedValue;
          import android.view.Gravity;
          import android.view.View;
          import android.view.ViewGroup;
          import android.widget.ArrayAdapter;
          import android.widget.Button;
          import android.widget.EditText;
          import android.widget.HorizontalScrollView;
          import android.widget.LinearLayout;
          import android.widget.ScrollView;
          import android.widget.Spinner;
          import android.widget.TextView;

          import java.util.ArrayList;
          import java.util.Arrays;
          import java.util.Collections;
          import java.util.Comparator;
          import java.util.List;
          import java.util.Locale;

          public class MainActivity extends Activity {

              private LinearLayout contentLayout;
              private LinearLayout suggestionBox;
              private EditText searchInput;
              private final List<RabbitBreed> breeds = new ArrayList<>();
              private String currentQuery = "";
              private String currentSizeFilter = "Alle";
              private boolean favoritesOnly = false;
              private SharedPreferences prefs;

              private final int BG = Color.parseColor("#FFF9F5");
              private final int CARD = Color.parseColor("#FFFFFF");
              private final int TITLE = Color.parseColor("#2F2A2A");
              private final int TEXT = Color.parseColor("#5B5451");
              private final int SOFT_TEXT = Color.parseColor("#7C726C");
              private final int PINK = Color.parseColor("#F9DDE3");
              private final int PEACH = Color.parseColor("#FDE8D7");
              private final int SAGE = Color.parseColor("#E4F0E8");
              private final int LAV = Color.parseColor("#EEE7F8");
              private final int ACCENT = Color.parseColor("#B96E7B");
              private final int GOLD = Color.parseColor("#FFF0B8");
              private final int BORDER = Color.parseColor("#E9DED3");
              private final int PURPLE_BOX = Color.parseColor("#F6F0FF");
              private final int PURPLE_BORDER = Color.parseColor("#E3D9F4");
              private final int GOLD_BORDER = Color.parseColor("#E0C56E");
              private final int RESULT_BG = Color.parseColor("#FFFDF5");
              private final int IMAGE_BG = Color.parseColor("#FFF6FB");
              private final int MINT_BOX = Color.parseColor("#F4FFF8");
              private final int MINT_BORDER = Color.parseColor("#D9F0E4");

              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);

                  prefs = getSharedPreferences("kaninguide", MODE_PRIVATE);
                  seedData();

                  ScrollView scrollView = new ScrollView(this);
                  scrollView.setBackgroundColor(BG);

                  LinearLayout root = new LinearLayout(this);
                  root.setOrientation(LinearLayout.VERTICAL);
                  root.setPadding(dp(16), dp(16), dp(16), dp(28));

                  LinearLayout hero = new LinearLayout(this);
                  hero.setOrientation(LinearLayout.VERTICAL);
                  hero.setPadding(dp(18), dp(18), dp(18), dp(18));
                  hero.setBackground(makeRounded(CARD, 30, BORDER, 2));

                  TextView title = new TextView(this);
                  title.setText("Kaninguide");
                  title.setTextSize(TypedValue.COMPLEX_UNIT_SP, 36);
                  title.setTypeface(Typeface.DEFAULT_BOLD);
                  title.setTextColor(TITLE);
                  hero.addView(title);

                  TextView subtitle = new TextView(this);
                  subtitle.setText("v16.1 med lokale bildeplassholdere, flere raser, sammenligning og kryssing.");
                  subtitle.setTextSize(TypedValue.COMPLEX_UNIT_SP, 16);
                  subtitle.setTextColor(TEXT);
                  subtitle.setPadding(0, dp(8), 0, 0);
                  hero.addView(subtitle);

                  root.addView(hero, matchWrap(dp(12)));

                  searchInput = new EditText(this);
                  searchInput.setHint("Søk etter rase, farge, temperament...");
                  searchInput.setSingleLine(true);
                  searchInput.setTextSize(TypedValue.COMPLEX_UNIT_SP, 16);
                  searchInput.setPadding(dp(16), dp(14), dp(16), dp(14));
                  searchInput.setTextColor(TITLE);
                  searchInput.setHintTextColor(Color.parseColor("#9C918A"));
                  searchInput.setBackground(makeRounded(CARD, 22, ACCENT, 2));
                  root.addView(searchInput, matchWrap(dp(8)));

                  suggestionBox = new LinearLayout(this);
                  suggestionBox.setOrientation(LinearLayout.VERTICAL);
                  suggestionBox.setBackground(makeRounded(Color.parseColor("#FFF7FB"), 20, BORDER, 2));
                  suggestionBox.setPadding(dp(12), dp(8), dp(12), dp(8));
                  suggestionBox.setVisibility(View.GONE);
                  root.addView(suggestionBox, matchWrap(dp(12)));

                  addQuickPicks(root);

                  HorizontalScrollView hsv = new HorizontalScrollView(this);
                  hsv.setHorizontalScrollBarEnabled(false);
                  LinearLayout filterRow = new LinearLayout(this);
                  filterRow.setOrientation(LinearLayout.HORIZONTAL);
                  filterRow.setPadding(0, 0, dp(50), 0);
                  hsv.addView(filterRow);
                  root.addView(hsv, matchWrap(dp(12)));

                  String[] filters = new String[]{"Alle", "Liten", "Mellomstor", "Stor", "Favoritter"};
                  for (String filter : filters) {
                      Button btn = new Button(this);
                      btn.setText(filter);
                      btn.setAllCaps(false);
                      styleFilterButton(btn, false);

                      LinearLayout.LayoutParams lp = new LinearLayout.LayoutParams(
                              ViewGroup.LayoutParams.WRAP_CONTENT,
                              ViewGroup.LayoutParams.WRAP_CONTENT
                      );
                      lp.rightMargin = dp(8);
                      btn.setLayoutParams(lp);

                      btn.setOnClickListener(v -> {
                          if (filter.equals("Favoritter")) {
                              favoritesOnly = !favoritesOnly;
                          } else {
                              currentSizeFilter = filter;
                          }
                          updateFilterButtons(filterRow);
                          render();
                      });

                      filterRow.addView(btn);
                  }

                  contentLayout = new LinearLayout(this);
                  contentLayout.setOrientation(LinearLayout.VERTICAL);
                  root.addView(contentLayout);

                  scrollView.addView(root);
                  setContentView(scrollView);

                  updateFilterButtons(filterRow);
                  render();

                  searchInput.addTextChangedListener(new TextWatcher() {
                      @Override public void beforeTextChanged(CharSequence s, int start, int count, int after) {}
                      @Override public void afterTextChanged(Editable s) {}

                      @Override
                      public void onTextChanged(CharSequence s, int start, int before, int count) {
                          currentQuery = s.toString();
                          updateSuggestions();
                          renderBreedList();
                      }
                  });
              }

              private void render() {
                  contentLayout.removeAllViews();

                  addInfoCard(
                          "🐇 Farger og avl – enkelt forklart",
                          new String[]{
                                  "Blå + blå gir ofte blå unger.",
                                  "Hvit rødøyd kan skjule andre farger.",
                                  "Viltgrå kan gi flere variasjoner.",
                                  "Like foreldre kan fortsatt gi ulike farger hvis de bærer skjulte gener."
                          },
                          PEACH
                  );

                  addQuizCard();
                  addColorCalculatorCard();
                  addComparisonCard();
                  addCrossingCard();
                  renderBreedList();
              }

              private void renderBreedList() {
                  while (contentLayout.getChildCount() > 4) {
                      contentLayout.removeViewAt(4);
                  }

                  List<RabbitBreed> favorites = new ArrayList<>();
                  List<RabbitBreed> normal = new ArrayList<>();

                  String q = currentQuery == null ? "" : currentQuery.trim().toLowerCase(Locale.ROOT);

                  for (RabbitBreed breed : breeds) {
                      boolean sizeOk = currentSizeFilter.equals("Alle") || breed.size.equalsIgnoreCase(currentSizeFilter);
                      boolean queryOk = q.isEmpty() || breed.searchText().contains(q);
                      boolean favOk = !favoritesOnly || isFavorite(breed.name);

                      if (sizeOk && queryOk && favOk) {
                          if (isFavorite(breed.name)) favorites.add(breed);
                          else normal.add(breed);
                      }
                  }

                  if (!favorites.isEmpty()) {
                      addMiniHeadline("Mine favoritter ⭐");
                      for (RabbitBreed breed : favorites) {
                          contentLayout.addView(createBreedCard(breed, true));
                      }
                  }

                  addMiniHeadline("Raser");
                  for (RabbitBreed breed : normal) {
                      contentLayout.addView(createBreedCard(breed, false));
                  }

                  if (favorites.isEmpty() && normal.isEmpty()) {
                      LinearLayout empty = new LinearLayout(this);
                      empty.setOrientation(LinearLayout.VERTICAL);
                      empty.setPadding(dp(18), dp(18), dp(18), dp(18));
                      empty.setBackground(makeRounded(CARD, 24, BORDER, 2));

                      TextView tv = new TextView(this);
                      tv.setText("Ingen treff på søket ditt.");
                      tv.setTextSize(TypedValue.COMPLEX_UNIT_SP, 20);
                      tv.setTypeface(Typeface.DEFAULT_BOLD);
                      tv.setTextColor(TITLE);
                      empty.addView(tv);

                      TextView hint = new TextView(this);
                      hint.setText("Prøv ord som rolig, hvit, stor, pels, familiekanin eller vedder.");
                      hint.setTextSize(TypedValue.COMPLEX_UNIT_SP, 15);
                      hint.setTextColor(TEXT);
                      hint.setPadding(0, dp(8), 0, 0);
                      empty.addView(hint);

                      contentLayout.addView(empty, matchWrap(dp(12)));
                  }
              }

              private void addQuickPicks(LinearLayout root) {
                  TextView h = new TextView(this);
                  h.setText("Hurtigvalg");
                  h.setTextSize(TypedValue.COMPLEX_UNIT_SP, 18);
                  h.setTypeface(Typeface.DEFAULT_BOLD);
                  h.setTextColor(TITLE);
                  h.setPadding(dp(4), dp(6), dp(4), dp(8));
                  root.addView(h);

                  HorizontalScrollView hsv = new HorizontalScrollView(this);
                  hsv.setHorizontalScrollBarEnabled(false);

                  LinearLayout row = new LinearLayout(this);
                  row.setOrientation(LinearLayout.HORIZONTAL);
                  row.setPadding(0, 0, dp(50), 0);
                  hsv.addView(row);

                  String[] chips = new String[]{"Familievennlig", "Rolig", "Mye stell", "Stor", "Liten", "Vedder"};
                  for (String chip : chips) {
                      Button b = new Button(this);
                      b.setAllCaps(false);
                      b.setText(chip);
                      b.setTextSize(TypedValue.COMPLEX_UNIT_SP, 14);
                      b.setTextColor(TITLE);
                      b.setBackground(makeRounded(Color.parseColor("#FFF7F1"), 18, BORDER, 2));

                      LinearLayout.LayoutParams lp = new LinearLayout.LayoutParams(
                              ViewGroup.LayoutParams.WRAP_CONTENT,
                              ViewGroup.LayoutParams.WRAP_CONTENT
                      );
                      lp.rightMargin = dp(8);
                      b.setLayoutParams(lp);

                      b.setOnClickListener(v -> {
                          searchInput.setText(chip);
                          searchInput.setSelection(chip.length());
                      });

                      row.addView(b);
                  }

                  root.addView(hsv, matchWrap(dp(12)));
              }

              private void updateSuggestions() {
                  suggestionBox.removeAllViews();

                  String q = currentQuery == null ? "" : currentQuery.trim().toLowerCase(Locale.ROOT);
                  if (q.isEmpty()) {
                      suggestionBox.setVisibility(View.GONE);
                      return;
                  }

                  List<RabbitBreed> suggestions = getSuggestions(q);
                  if (suggestions.isEmpty()) {
                      suggestionBox.setVisibility(View.GONE);
                      return;
                  }

                  suggestionBox.setVisibility(View.VISIBLE);
                  int count = Math.min(6, suggestions.size());

                  for (int i = 0; i < count; i++) {
                      RabbitBreed breed = suggestions.get(i);

                      LinearLayout item = new LinearLayout(this);
                      item.setOrientation(LinearLayout.HORIZONTAL);
                      item.setGravity(Gravity.CENTER_VERTICAL);
                      item.setPadding(dp(8), dp(10), dp(8), dp(10));

                      TextView thumb = new TextView(this);
                      thumb.setText("🐇");
                      thumb.setGravity(Gravity.CENTER);
                      thumb.setTextSize(TypedValue.COMPLEX_UNIT_SP, 20);
                      thumb.setBackground(makeRounded(IMAGE_BG, 12, BORDER, 1));
                      LinearLayout.LayoutParams imgLp = new LinearLayout.LayoutParams(dp(44), dp(44));
                      imgLp.rightMargin = dp(10);
                      thumb.setLayoutParams(imgLp);
                      item.addView(thumb);

                      LinearLayout textWrap = new LinearLayout(this);
                      textWrap.setOrientation(LinearLayout.VERTICAL);
                      textWrap.setLayoutParams(new LinearLayout.LayoutParams(0, ViewGroup.LayoutParams.WRAP_CONTENT, 1f));

                      TextView line1 = new TextView(this);
                      line1.setText(breed.name);
                      line1.setTextSize(TypedValue.COMPLEX_UNIT_SP, 16);
                      line1.setTypeface(Typeface.DEFAULT_BOLD);
                      line1.setTextColor(TITLE);
                      textWrap.addView(line1);

                      TextView line2 = new TextView(this);
                      line2.setText(breed.size + " • " + breed.tag);
                      line2.setTextSize(TypedValue.COMPLEX_UNIT_SP, 13);
                      line2.setTextColor(SOFT_TEXT);
                      line2.setPadding(0, dp(2), 0, 0);
                      textWrap.addView(line2);

                      item.addView(textWrap);

                      item.setOnClickListener(v -> {
                          searchInput.setText(breed.name);
                          searchInput.setSelection(breed.name.length());
                          suggestionBox.setVisibility(View.GONE);
                          openDetail(breed);
                      });

                      suggestionBox.addView(item);
                  }
              }

              private void addQuizCard() {
                  LinearLayout card = new LinearLayout(this);
                  card.setOrientation(LinearLayout.VERTICAL);
                  card.setPadding(dp(16), dp(16), dp(16), dp(16));
                  card.setBackground(makeRounded(Color.parseColor("#FFF6FB"), 26, Color.parseColor("#F0D8E7"), 2));

                  TextView title = new TextView(this);
                  title.setText("Hvilken rase passer meg?");
                  title.setTextSize(TypedValue.COMPLEX_UNIT_SP, 22);
                  title.setTypeface(Typeface.DEFAULT_BOLD);
                  title.setTextColor(TITLE);
                  card.addView(title);

                  TextView desc = new TextView(this);
                  desc.setText("Velg det som passer best, og få topp 3 forslag.");
                  desc.setTextSize(TypedValue.COMPLEX_UNIT_SP, 15);
                  desc.setTextColor(TEXT);
                  desc.setPadding(0, dp(6), 0, dp(10));
                  card.addView(desc);

                  Spinner sizeSpinner = new Spinner(this);
                  sizeSpinner.setAdapter(new ArrayAdapter<>(this, android.R.layout.simple_spinner_dropdown_item,
                          Arrays.asList("Liten", "Mellomstor", "Stor")));
                  card.addView(sizeSpinner);

                  Spinner temperSpinner = new Spinner(this);
                  temperSpinner.setAdapter(new ArrayAdapter<>(this, android.R.layout.simple_spinner_dropdown_item,
                          Arrays.asList("Rolig", "Aktiv", "Familievennlig", "Mye stell")));
                  LinearLayout.LayoutParams temperLp = matchWrap(0);
                  temperLp.topMargin = dp(10);
                  card.addView(temperSpinner, temperLp);

                  Spinner careSpinner = new Spinner(this);
                  careSpinner.setAdapter(new ArrayAdapter<>(this, android.R.layout.simple_spinner_dropdown_item,
                          Arrays.asList("Lite stell", "Middels", "Mye stell")));
                  LinearLayout.LayoutParams careLp = matchWrap(0);
                  careLp.topMargin = dp(10);
                  card.addView(careSpinner, careLp);

                  Button btn = new Button(this);
                  btn.setText("Vis topp 3");
                  btn.setAllCaps(false);
                  btn.setBackground(makeRounded(ACCENT, 20, ACCENT, 0));
                  btn.setTextColor(Color.WHITE);
                  LinearLayout.LayoutParams btnLp = matchWrap(0);
                  btnLp.topMargin = dp(12);
                  card.addView(btn, btnLp);

                  TextView result = new TextView(this);
                  result.setText("Ingen anbefaling valgt ennå.");
                  result.setTextSize(TypedValue.COMPLEX_UNIT_SP, 16);
                  result.setTextColor(TEXT);
                  result.setPadding(dp(12), dp(12), dp(12), dp(12));
                  result.setBackground(makeRounded(RESULT_BG, 18, BORDER, 2));
                  LinearLayout.LayoutParams resultLp = matchWrap(0);
                  resultLp.topMargin = dp(12);
                  card.addView(result, resultLp);

                  btn.setOnClickListener(v -> {
                      String s = sizeSpinner.getSelectedItem().toString();
                      String t = temperSpinner.getSelectedItem().toString();
                      String c = careSpinner.getSelectedItem().toString();
                      result.setText(getTop3Result(s, t, c));
                  });

                  contentLayout.addView(card, matchWrap(dp(14)));
              }

              private void addColorCalculatorCard() {
                  LinearLayout card = new LinearLayout(this);
                  card.setOrientation(LinearLayout.VERTICAL);
                  card.setPadding(dp(16), dp(16), dp(16), dp(16));
                  card.setBackground(makeRounded(PURPLE_BOX, 26, PURPLE_BORDER, 2));

                  TextView title = new TextView(this);
                  title.setText("Bedre fargekalkulator");
                  title.setTextSize(TypedValue.COMPLEX_UNIT_SP, 22);
                  title.setTypeface(Typeface.DEFAULT_BOLD);
                  title.setTextColor(TITLE);
                  card.addView(title);

                  TextView desc = new TextView(this);
                  desc.setText("Velg farge på mor og far for å få flere mulige utfall.");
                  desc.setTextSize(TypedValue.COMPLEX_UNIT_SP, 15);
                  desc.setTextColor(TEXT);
                  desc.setPadding(0, dp(6), 0, dp(10));
                  card.addView(desc);

                  List<String> colors = Arrays.asList("Blå", "Hvit rødøyd", "Viltgrå", "Svart", "Japaner", "Madagaskar");

                  Spinner mother = new Spinner(this);
                  mother.setAdapter(new ArrayAdapter<>(this, android.R.layout.simple_spinner_dropdown_item, colors));
                  card.addView(mother);

                  Spinner father = new Spinner(this);
                  father.setAdapter(new ArrayAdapter<>(this, android.R.layout.simple_spinner_dropdown_item, colors));
                  LinearLayout.LayoutParams fatherLp = matchWrap(0);
                  fatherLp.topMargin = dp(10);
                  card.addView(father, fatherLp);

                  Button btn = new Button(this);
                  btn.setText("Beregn");
                  btn.setAllCaps(false);
                  btn.setBackground(makeRounded(Color.parseColor("#7C6ACF"), 20, Color.parseColor("#7C6ACF"), 0));
                  btn.setTextColor(Color.WHITE);
                  LinearLayout.LayoutParams btnLp = matchWrap(0);
                  btnLp.topMargin = dp(12);
                  card.addView(btn, btnLp);

                  TextView result = new TextView(this);
                  result.setText("Ingen beregning ennå.");
                  result.setTextSize(TypedValue.COMPLEX_UNIT_SP, 16);
                  result.setTextColor(TEXT);
                  result.setPadding(dp(12), dp(12), dp(12), dp(12));
                  result.setBackground(makeRounded(RESULT_BG, 18, BORDER, 2));
                  LinearLayout.LayoutParams resultLp = matchWrap(0);
                  resultLp.topMargin = dp(12);
                  card.addView(result, resultLp);

                  btn.setOnClickListener(v -> {
                      String m = mother.getSelectedItem().toString();
                      String f = father.getSelectedItem().toString();
                      result.setText(getBetterColorResult(m, f));
                  });

                  contentLayout.addView(card, matchWrap(dp(14)));
              }

              private void addComparisonCard() {
                  LinearLayout card = new LinearLayout(this);
                  card.setOrientation(LinearLayout.VERTICAL);
                  card.setPadding(dp(16), dp(16), dp(16), dp(16));
                  card.setBackground(makeRounded(MINT_BOX, 26, MINT_BORDER, 2));

                  TextView title = new TextView(this);
                  title.setText("Sammenlign raser");
                  title.setTextSize(TypedValue.COMPLEX_UNIT_SP, 22);
                  title.setTypeface(Typeface.DEFAULT_BOLD);
                  title.setTextColor(TITLE);
                  card.addView(title);

                  TextView desc = new TextView(this);
                  desc.setText("Velg to raser og få en enkel sammenligning.");
                  desc.setTextSize(TypedValue.COMPLEX_UNIT_SP, 15);
                  desc.setTextColor(TEXT);
                  desc.setPadding(0, dp(6), 0, dp(10));
                  card.addView(desc);

                  List<String> breedNames = getBreedNames();

                  Spinner a = new Spinner(this);
                  a.setAdapter(new ArrayAdapter<>(this, android.R.layout.simple_spinner_dropdown_item, breedNames));
                  card.addView(a);

                  Spinner b = new Spinner(this);
