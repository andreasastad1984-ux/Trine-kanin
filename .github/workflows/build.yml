                  intent.putExtra("size", breed.size);
                  intent.putExtra("weight", breed.weight);
                  intent.putExtra("tag", breed.tag);
                  intent.putExtra("temperament", breed.temperament);
                  intent.putExtra("colors", breed.colors);
                  intent.putExtra("reproduction", breed.reproduction);
                  intent.putExtra("pros", breed.pros);
                  intent.putExtra("cons", breed.cons);
                  intent.putExtra("needs", breed.needs);
                  intent.putExtra("careLevel", breed.careLevel);
                  intent.putExtra("crossingNote", breed.crossingNote);
                  startActivity(intent);
              }

