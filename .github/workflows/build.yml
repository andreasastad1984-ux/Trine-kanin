name: Build APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Create project
        run: |
          mkdir -p app/src/main/java/com/trine/kanin
          mkdir -p app/src/main/res/values

          echo "android.useAndroidX=true" > gradle.properties

          cat <<EOF > settings.gradle
          pluginManagement {
            repositories {
              google()
              mavenCentral()
              gradlePluginPortal()
            }
          }
          dependencyResolutionManagement {
            repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
            repositories {
              google()
              mavenCentral()
            }
          }
          rootProject.name="app"
          include(":app")
          EOF

          cat <<EOF > build.gradle
          plugins {
            id 'com.android.application' version '8.2.2' apply false
          }
          EOF

          cat <<EOF > app/build.gradle
          plugins {
            id 'com.android.application'
          }

          android {
            namespace "com.trine.kanin"
            compileSdk 34

            defaultConfig {
              applicationId "com.trine.kanin"
              minSdk 24
              targetSdk 34
              versionCode 7
              versionName "7.0"
            }

            buildTypes {
              release {
                minifyEnabled false
              }
            }

            compileOptions {
              sourceCompatibility JavaVersion.VERSION_17
              targetCompatibility JavaVersion.VERSION_17
            }
          }
          EOF

          cat <<EOF > app/src/main/AndroidManifest.xml
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <application
                  android:label="Kaninguide"
                  android:theme="@android:style/Theme.Material.Light.NoActionBar">
                  <activity
                      android:name=".MainActivity"
                      android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

          cat <<EOF > app/src/main/res/values/strings.xml
          <resources>
              <string name="app_name">Kaninguide</string>
          </resources>
          EOF

          cat <<'EOF' > app/src/main/java/com/trine/kanin/MainActivity.java
          package com.trine.kanin;

          import android.app.Activity;
          import android.content.SharedPreferences;
          import android.graphics.Color;
          import android.graphics.Typeface;
          import android.graphics.drawable.GradientDrawable;
          import android.os.Bundle;
          import android.text.Editable;
          import android.text.TextWatcher;
          import android.util.TypedValue;
          import android.view.View;
          import android.view.ViewGroup;
          import android.widget.ArrayAdapter;
          import android.widget.Button;
          import android.widget.EditText;
          import android.widget.HorizontalScrollView;
          import android.widget.LinearLayout;
          import android.widget.ScrollView;
          import android.widget.Spinner;
          import android.widget.TextView;

          import java.util.ArrayList;
          import java.util.Arrays;
          import java.util.List;
          import java.util.Locale;

          public class MainActivity extends Activity {

              private LinearLayout contentLayout;
              private final List<RabbitBreed> breeds = new ArrayList<>();
              private String currentQuery = "";
              private String currentSizeFilter = "Alle";
              private boolean favoritesOnly = false;
              private String fitResult = "";
              private String colorResult = "";
              private SharedPreferences prefs;

              private final int BG = Color.parseColor("#FFF9F5");
              private final int CARD = Color.parseColor("#FFFFFF");
              private final int TITLE = Color.parseColor("#2F2A2A");
              private final int TEXT = Color.parseColor("#5B5451");
              private final int PINK = Color.parseColor("#F9DDE3");
              private final int PEACH = Color.parseColor("#FDE8D7");
              private final int SAGE = Color.parseColor("#E4F0E8");
              private final int SAND = Color.parseColor("#F3ECE3");
              private final int LAV = Color.parseColor("#EEE7F8");
              private final int ACCENT = Color.parseColor("#B96E7B");
              private final int GOLD = Color.parseColor("#FFF0B8");
              private final int BORDER = Color.parseColor("#E9DED3");

              private EditText searchInput;

              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);

                  prefs = getSharedPreferences("kaninguide", MODE_PRIVATE);
                  seedData();

                  ScrollView scrollView = new ScrollView(this);
                  scrollView.setBackgroundColor(BG);

                  LinearLayout root = new LinearLayout(this);
                  root.setOrientation(LinearLayout.VERTICAL);
                  root.setPadding(dp(16), dp(16), dp(16), dp(28));

                  LinearLayout hero = new LinearLayout(this);
                  hero.setOrientation(LinearLayout.VERTICAL);
                  hero.setPadding(dp(18), dp(18), dp(18), dp(18));
                  hero.setBackground(makeRounded(CARD, 28, BORDER, 2));

                  TextView title = new TextView(this);
                  title.setText("Kaninguide");
                  title.setTextSize(TypedValue.COMPLEX_UNIT_SP, 32);
                  title.setTypeface(Typeface.DEFAULT_BOLD);
                  title.setTextColor(TITLE);
                  hero.addView(title);

                  TextView subtitle = new TextView(this);
                  subtitle.setText("Søk, filtrer og sammenlign kaninraser, farger, temperament, reproduksjon og stell.");
                  subtitle.setTextSize(TypedValue.COMPLEX_UNIT_SP, 16);
                  subtitle.setTextColor(TEXT);
                  subtitle.setPadding(0, dp(8), 0, 0);
                  hero.addView(subtitle);

                  root.addView(hero, matchWrap(dp(12)));

                  searchInput = new EditText(this);
                  searchInput.setHint("Søk etter rase, farge, temperament...");
                  searchInput.setSingleLine(true);
                  searchInput.setTextSize(TypedValue.COMPLEX_UNIT_SP, 16);
                  searchInput.setPadding(dp(16), dp(14), dp(16), dp(14));
                  searchInput.setTextColor(TITLE);
                  searchInput.setHintTextColor(Color.parseColor("#9C918A"));
                  searchInput.setBackground(makeRounded(Color.WHITE, 22, BORDER, 2));
                  root.addView(searchInput, matchWrap(dp(12)));

                  HorizontalScrollView hsv = new HorizontalScrollView(this);
                  hsv.setHorizontalScrollBarEnabled(false);
                  LinearLayout filterRow = new LinearLayout(this);
                  filterRow.setOrientation(LinearLayout.HORIZONTAL);
                  hsv.addView(filterRow);
                  root.addView(hsv, matchWrap(dp(12)));

                  String[] filters = new String[]{"Alle", "Liten", "Mellomstor", "Stor", "Favoritter"};
                  for (String filter : filters) {
                      Button btn = new Button(this);
                      btn.setText(filter);
                      btn.setAllCaps(false);
                      styleFilterButton(btn, false);
                      LinearLayout.LayoutParams lp = new LinearLayout.LayoutParams(
                              ViewGroup.LayoutParams.WRAP_CONTENT,
                              ViewGroup.LayoutParams.WRAP_CONTENT
                      );
                      lp.rightMargin = dp(8);
                      btn.setLayoutParams(lp);

                      btn.setOnClickListener(v -> {
                          if (filter.equals("Favoritter")) {
                              favoritesOnly = !favoritesOnly;
                          } else {
                              currentSizeFilter = filter;
                          }
                          updateFilterButtons(filterRow);
                          render();
                      });

                      filterRow.addView(btn);
                  }

                  contentLayout = new LinearLayout(this);
                  contentLayout.setOrientation(LinearLayout.VERTICAL);
                  root.addView(contentLayout);

                  scrollView.addView(root);
                  setContentView(scrollView);

                  updateFilterButtons(filterRow);
                  render();

                  searchInput.addTextChangedListener(new TextWatcher() {
                      @Override public void beforeTextChanged(CharSequence s, int start, int count, int after) {}
                      @Override public void afterTextChanged(Editable s) {}
                      @Override
                      public void onTextChanged(CharSequence s, int start, int before, int count) {
                          currentQuery = s.toString();
                          render();
                      }
                  });
              }

              private void render() {
                  contentLayout.removeAllViews();

                  addInfoCard(
                          "Farger og avl – enkelt forklart",
                          new String[]{
                                  "Blå + blå gir ofte blå unger.",
                                  "Hvit rødøyd kan skjule andre farger.",
                                  "Viltgrå kan gi flere variasjoner.",
                                  "Like foreldre kan fortsatt gi ulike farger hvis de bærer skjulte gener."
                          },
                          PEACH
                  );

                  addFitGuideCard();
                  addColorCalculatorCard();

                  List<RabbitBreed> suggestions = getSuggestions(currentQuery);
                  if (!currentQuery.trim().isEmpty() && !suggestions.isEmpty()) {
                      addSuggestionCard(suggestions);
                  }

                  List<RabbitBreed> favorites = new ArrayList<>();
                  List<RabbitBreed> normal = new ArrayList<>();

                  String q = currentQuery == null ? "" : currentQuery.trim().toLowerCase(Locale.ROOT);

                  for (RabbitBreed breed : breeds) {
                      boolean sizeOk = currentSizeFilter.equals("Alle") || breed.size.equalsIgnoreCase(currentSizeFilter);
                      boolean queryOk = q.isEmpty() || breed.searchText().contains(q);
                      boolean favOk = !favoritesOnly || isFavorite(breed.name);

                      if (sizeOk && queryOk && favOk) {
                          if (isFavorite(breed.name)) favorites.add(breed);
                          else normal.add(breed);
                      }
                  }

                  if (!favorites.isEmpty()) {
                      addMiniHeadline("Favoritter ⭐");
                      for (RabbitBreed breed : favorites) {
                          contentLayout.addView(createBreedCard(breed, true));
                      }
                  }

                  addMiniHeadline("Raser");
                  for (RabbitBreed breed : normal) {
                      contentLayout.addView(createBreedCard(breed, false));
                  }

                  if (favorites.isEmpty() && normal.isEmpty()) {
                      LinearLayout empty = new LinearLayout(this);
                      empty.setOrientation(LinearLayout.VERTICAL);
                      empty.setPadding(dp(18), dp(18), dp(18), dp(18));
                      empty.setBackground(makeRounded(CARD, 24, BORDER, 2));

                      TextView tv = new TextView(this);
                      tv.setText("Ingen treff på søket ditt.");
                      tv.setTextSize(TypedValue.COMPLEX_UNIT_SP, 20);
                      tv.setTypeface(Typeface.DEFAULT_BOLD);
                      tv.setTextColor(TITLE);
                      empty.addView(tv);

                      TextView hint = new TextView(this);
                      hint.setText("Prøv ord som rolig, hvit, stor, pels, familiekanin eller vedder.");
                      hint.setTextSize(TypedValue.COMPLEX_UNIT_SP, 15);
                      hint.setTextColor(TEXT);
                      hint.setPadding(0, dp(8), 0, 0);
                      empty.addView(hint);

                      contentLayout.addView(empty, matchWrap(dp(12)));
                  }
              }

              private void addSuggestionCard(List<RabbitBreed> suggestions) {
                  LinearLayout box = new LinearLayout(this);
                  box.setOrientation(LinearLayout.VERTICAL);
                  box.setPadding(dp(16), dp(16), dp(16), dp(16));
                  box.setBackground(makeRounded("#F6F0FF", 22, "#E3D9F4", 2));

                  TextView title = new TextView(this);
                  title.setText("Forslag");
                  title.setTextSize(TypedValue.COMPLEX_UNIT_SP, 20);
                  title.setTypeface(Typeface.DEFAULT_BOLD);
                  title.setTextColor(TITLE);
                  box.addView(title);

                  int count = Math.min(4, suggestions.size());
                  for (int i = 0; i < count; i++) {
                      RabbitBreed breed = suggestions.get(i);
                      TextView item = new TextView(this);
                      item.setText("• " + breed.name + " (" + breed.size + ")");
                      item.setTextSize(TypedValue.COMPLEX_UNIT_SP, 16);
                      item.setTextColor(TEXT);
                      item.setPadding(0, dp(8), 0, 0);
                      item.setOnClickListener(v -> {
                          searchInput.setText(breed.name);
                          searchInput.setSelection(breed.name.length());
                      });
                      box.addView(item);
                  }

                  contentLayout.addView(box, matchWrap(dp(14)));
              }

              private void addFitGuideCard() {
                  LinearLayout card = new LinearLayout(this);
                  card.setOrientation(LinearLayout.VERTICAL);
                  card.setPadding(dp(16), dp(16), dp(16), dp(16));
                  card.setBackground(makeRounded("#FFF6FB", 24, "#F0D8E7", 2));

                  TextView title = new TextView(this);
                  title.setText("Hvilken rase passer meg?");
                  title.setTextSize(TypedValue.COMPLEX_UNIT_SP, 22);
                  title.setTypeface(Typeface.DEFAULT_BOLD);
                  title.setTextColor(TITLE);
                  card.addView(title);

                  TextView desc = new TextView(this);
                  desc.setText("Velg det som passer best, og få et enkelt forslag.");
                  desc.setTextSize(TypedValue.COMPLEX_UNIT_SP, 15);
                  desc.setTextColor(TEXT);
                  desc.setPadding(0, dp(6), 0, dp(10));
                  card.addView(desc);

                  Spinner sizeSpinner = new Spinner(this);
                  List<String> sizes = Arrays.asList("Liten", "Mellomstor", "Stor");
                  sizeSpinner.setAdapter(new ArrayAdapter<>(this, android.R.layout.simple_spinner_dropdown_item, sizes));
                  card.addView(sizeSpinner);

                  Spinner temperSpinner = new Spinner(this);
                  List<String> tempers = Arrays.asList("Rolig", "Aktiv", "Familievennlig", "Mye stell");
                  temperSpinner.setAdapter(new ArrayAdapter<>(this, android.R.layout.simple_spinner_dropdown_item, tempers));
                  LinearLayout.LayoutParams temperLp = matchWrap(0);
                  temperLp.topMargin = dp(10);
                  card.addView(temperSpinner, temperLp);

                  Button btn = new Button(this);
                  btn.setText("Finn rase");
                  btn.setAllCaps(false);
                  btn.setBackground(makeRounded(ACCENT, 18, ACCENT, 0));
                  btn.setTextColor(Color.WHITE);
                  LinearLayout.LayoutParams btnLp = matchWrap(0);
                  btnLp.topMargin = dp(12);
                  card.addView(btn, btnLp);

                  TextView result = new TextView(this);
                  result.setText(fitResult.isEmpty() ? "Ingen anbefaling valgt ennå." : fitResult);
                  result.setTextSize(TypedValue.COMPLEX_UNIT_SP, 16);
                  result.setTextColor(TEXT);
                  result.setPadding(0, dp(12), 0, 0);
                  card.addView(result);

                  btn.setOnClickListener(v -> {
                      String s = sizeSpinner.getSelectedItem().toString();
                      String t = temperSpinner.getSelectedItem().toString();
                      fitResult = getFitResult(s, t);
                      render();
                  });

                  contentLayout.addView(card, matchWrap(dp(14)));
              }

              private void addColorCalculatorCard() {
                  LinearLayout card = new LinearLayout(this);
                  card.setOrientation(LinearLayout.VERTICAL);
                  card.setPadding(dp(16), dp(16), dp(16), dp(16));
                  card.setBackground(makeRounded("#F7F3FF", 24, "#E2D9F2", 2));

                  TextView title = new TextView(this);
                  title.setText("Enkel fargekalkulator");
                  title.setTextSize(TypedValue.COMPLEX_UNIT_SP, 22);
                  title.setTypeface(Typeface.DEFAULT_BOLD);
                  title.setTextColor(TITLE);
                  card.addView(title);

                  TextView desc = new TextView(this);
                  desc.setText("Velg farge på mor og far for å få et veiledende resultat.");
                  desc.setTextSize(TypedValue.COMPLEX_UNIT_SP, 15);
                  desc.setTextColor(TEXT);
                  desc.setPadding(0, dp(6), 0, dp(10));
                  card.addView(desc);

                  List<String> colors = Arrays.asList("Blå", "Hvit rødøyd", "Viltgrå", "Svart", "Japaner");

                  Spinner mother = new Spinner(this);
                  mother.setAdapter(new ArrayAdapter<>(this, android.R.layout.simple_spinner_dropdown_item, colors));
                  card.addView(mother);

                  Spinner father = new Spinner(this);
                  father.setAdapter(new ArrayAdapter<>(this, android.R.layout.simple_spinner_dropdown_item, colors));
                  LinearLayout.LayoutParams fatherLp = matchWrap(0);
                  fatherLp.topMargin = dp(10);
                  card.addView(father, fatherLp);

                  Button btn = new Button(this);
                  btn.setText("Beregn");
                  btn.setAllCaps(false);
                  btn.setBackground(makeRounded(Color.parseColor("#7C6ACF"), 18, "#7C6ACF", 0));
                  btn.setTextColor(Color.WHITE);
                  LinearLayout.LayoutParams btnLp = matchWrap(0);
                  btnLp.topMargin = dp(12);
                  card.addView(btn, btnLp);

                  TextView result = new TextView(this);
                  result.setText(colorResult.isEmpty() ? "Ingen beregning ennå." : colorResult);
                  result.setTextSize(TypedValue.COMPLEX_UNIT_SP, 16);
                  result.setTextColor(TEXT);
                  result.setPadding(0, dp(12), 0, 0);
                  card.addView(result);

                  btn.setOnClickListener(v -> {
                      String m = mother.getSelectedItem().toString();
                      String f = father.getSelectedItem().toString();
                      colorResult = getColorResult(m, f);
                      render();
                  });

                  contentLayout.addView(card, matchWrap(dp(14)));
              }

              private List<RabbitBreed> getSuggestions(String query) {
                  List<RabbitBreed> out = new ArrayList<>();
                  String q = query == null ? "" : query.trim().toLowerCase(Locale.ROOT);
                  if (q.isEmpty()) return out;

                  for (RabbitBreed breed : breeds) {
                      if (breed.searchText().contains(q)) {
                          out.add(breed);
                      }
                  }
                  return out;
              }

              private String getFitResult(String size, String temperament) {
                  if (size.equals("Liten") && temperament.equals("Familievennlig")) return "Forslag: Dvergvedder – liten og ofte fin som familiekanin.";
                  if (size.equals("Liten") && temperament.equals("Mye stell")) return "Forslag: Løvehode – liten og flott, men krever mer pelsstell.";
                  if (size.equals("Mellomstor") && temperament.equals("Rolig")) return "Forslag: Rex – rolig, vennlig og fin størrelse.";
                  if (size.equals("Mellomstor") && temperament.equals("Aktiv")) return "Forslag: Belgisk hare – aktiv og elegant.";
                  if (size.equals("Stor") && temperament.equals("Rolig")) return "Forslag: Fransk vedder – stor, tung og ofte rolig.";
                  if (size.equals("Stor") && temperament.equals("Familievennlig")) return "Forslag: New Zealand – robust og grei i større kaninhold.";
                  return "Forslag: Se både Dvergvedder, Rex og New Zealand – de er gode allround-valg.";
              }

              private String getColorResult(String mother, String father) {
                  if (mother.equals("Blå") && father.equals("Blå")) return "Mulig utfall: ofte blå unger. Dette er en av de mer forutsigbare kombinasjonene.";
                  if (mother.equals("Hvit rødøyd") || father.equals("Hvit rødøyd")) return "Mulig utfall: hvit rødøyd kan skjule andre farger, så avkom kan bli mer variert enn det ser ut som.";
                  if (mother.equals("Viltgrå") && father.equals("Viltgrå")) return "Mulig utfall: ofte viltgrå, men også andre variasjoner kan dukke opp.";
                  if (mother.equals("Svart") && father.equals("Svart")) return "Mulig utfall: ofte svart, men skjulte gener kan gi variasjon.";
                  if (mother.equals("Japaner") || father.equals("Japaner")) return "Mulig utfall: japaner kan gi spennende og varierte tegninger, men dette er vanskelig å forutsi nøyaktig.";
                  return "Mulig utfall: flere varianter. Resultatet er veiledende og avhenger av skjulte gener.";
              }

              private void addMiniHeadline(String text) {
                  TextView tv = new TextView(this);
                  tv.setText(text);
                  tv.setTextSize(TypedValue.COMPLEX_UNIT_SP, 20);
                  tv.setTypeface(Typeface.DEFAULT_BOLD);
                  tv.setTextColor(TITLE);
                  tv.setPadding(dp(4), dp(8), dp(4), dp(8));
                  contentLayout.addView(tv);
              }

              private void addInfoCard(String heading, String[] lines, int bgColor) {
                  LinearLayout box = new LinearLayout(this);
                  box.setOrientation(LinearLayout.VERTICAL);
                  box.setBackground(makeRounded(bgColor, 24, BORDER, 0));
                  box.setPadding(dp(16), dp(16), dp(16), dp(16));

                  TextView title = new TextView(this);
                  title.setText(heading);
                  title.setTextSize(TypedValue.COMPLEX_UNIT_SP, 21);
                  title.setTypeface(Typeface.DEFAULT_BOLD);
                  title.setTextColor(TITLE);
                  box.addView(title);

                  for (String line : lines) {
                      TextView tv = new TextView(this);
                      tv.setText("• " + line);
                      tv.setTextSize(TypedValue.COMPLEX_UNIT_SP, 16);
                      tv.setTextColor(TEXT);
                      tv.setPadding(0, dp(8), 0, 0);
                      box.addView(tv);
                  }

                  contentLayout.addView(box, matchWrap(dp(14)));
              }

              private LinearLayout createBreedCard(RabbitBreed breed, boolean favorite) {
                  LinearLayout card = new LinearLayout(this);
                  card.setOrientation(LinearLayout.VERTICAL);
                  card.setPadding(dp(18), dp(18), dp(18), dp(18));
                  card.setBackground(makeRounded(CARD, 26, BORDER, 2));

                  LinearLayout top = new LinearLayout(this);
                  top.setOrientation(LinearLayout.HORIZONTAL);

                  LinearLayout left = new LinearLayout(this);
                  left.setOrientation(LinearLayout.VERTICAL);
                  LinearLayout.LayoutParams leftLp = new LinearLayout.LayoutParams(0, ViewGroup.LayoutParams.WRAP_CONTENT, 1f);
                  left.setLayoutParams(leftLp);

                  TextView title = new TextView(this);
                  title.setText(breed.name);
                  title.setTextSize(TypedValue.COMPLEX_UNIT_SP, 26);
                  title.setTypeface(Typeface.DEFAULT_BOLD);
                  title.setTextColor(TITLE);
                  left.addView(title);

                  TextView meta = new TextView(this);
                  meta.setText(breed.size + " • " + breed.weight);
                  meta.setTextSize(TypedValue.COMPLEX_UNIT_SP, 15);
                  meta.setTextColor(TEXT);
                  meta.setPadding(0, dp(6), 0, dp(8));
                  left.addView(meta);

                  LinearLayout badges = new LinearLayout(this);
                  badges.setOrientation(LinearLayout.HORIZONTAL);
                  badges.addView(makeBadge(breed.size, LAV));
                  badges.addView(makeBadge(breed.tag, favorite ? PINK : SAGE));
                  left.addView(badges);

                  top.addView(left);

                  Button fav = new Button(this);
                  fav.setAllCaps(false);
                  fav.setText(favorite ? "★" : "☆");
                  fav.setTextSize(TypedValue.COMPLEX_UNIT_SP, 18);
                  fav.setBackground(makeRounded(GOLD, 18, "#E0C56E", 2));
                  fav.setTextColor(Color.parseColor("#8A5B00"));
                  fav.setOnClickListener(v -> {
                      toggleFavorite(breed.name);
                      render();
                  });
                  top.addView(fav);

                  card.addView(top);

                  addLabelValue(card, "Temperament", breed.temperament);
                  addLabelValue(card, "Vanlige farger", breed.colors);
                  addLabelValue(card, "Reproduksjon", breed.reproduction);

                  addBox(card, "Fordeler", breed.pros, SAGE);
                  addBox(card, "Ulemper", breed.cons, PINK);
                  addBox(card, "Hva rasen krever", breed.needs, SAND);

                  return card;
              }

              private View makeBadge(String text, int bg) {
                  TextView tv = new TextView(this);
                  tv.setText(text);
                  tv.setTextSize(TypedValue.COMPLEX_UNIT_SP, 13);
                  tv.setTextColor(TITLE);
                  tv.setPadding(dp(10), dp(6), dp(10), dp(6));
                  tv.setBackground(makeRounded(bg, 18, "#00000000", 0));

                  LinearLayout.LayoutParams lp = new LinearLayout.LayoutParams(
                          ViewGroup.LayoutParams.WRAP_CONTENT,
                          ViewGroup.LayoutParams.WRAP_CONTENT
                  );
                  lp.rightMargin = dp(8);
                  tv.setLayoutParams(lp);
                  return tv;
              }

              private void addLabelValue(LinearLayout parent, String label, String value) {
                  TextView l = new TextView(this);
                  l.setText(label);
                  l.setTextSize(TypedValue.COMPLEX_UNIT_SP, 17);
                  l.setTypeface(Typeface.DEFAULT_BOLD);
                  l.setTextColor(TITLE);
                  l.setPadding(0, dp(12), 0, dp(4));
                  parent.addView(l);

                  TextView v = new TextView(this);
                  v.setText(value);
                  v.setTextSize(TypedValue.COMPLEX_UNIT_SP, 16);
                  v.setTextColor(TEXT);
                  parent.addView(v);
              }

              private void addBox(LinearLayout parent, String titleText, String body, int bgColor) {
                  LinearLayout box = new LinearLayout(this);
                  box.setOrientation(LinearLayout.VERTICAL);
                  box.setBackground(makeRounded(bgColor, 20, "#00000000", 0));
                  box.setPadding(dp(14), dp(14), dp(14), dp(14));

                  LinearLayout.LayoutParams lp = new LinearLayout.LayoutParams(
                          ViewGroup.LayoutParams.MATCH_PARENT,
                          ViewGroup.LayoutParams.WRAP_CONTENT
                  );
                  lp.topMargin = dp(12);
                  box.setLayoutParams(lp);

                  TextView title = new TextView(this);
                  title.setText(titleText);
                  title.setTextSize(TypedValue.COMPLEX_UNIT_SP, 17);
                  title.setTypeface(Typeface.DEFAULT_BOLD);
                  title.setTextColor(TITLE);
                  box.addView(title);

                  TextView text = new TextView(this);
                  text.setText(body);
                  text.setTextSize(TypedValue.COMPLEX_UNIT_SP, 16);
                  text.setTextColor(TEXT);
                  text.setPadding(0, dp(8), 0, 0);
                  box.addView(text);

                  parent.addView(box);
              }

              private GradientDrawable makeRounded(int color, int radiusDp, int strokeColor, int strokeDp) {
                  GradientDrawable d = new GradientDrawable();
                  d.setColor(color);
                  d.setCornerRadius(dp(radiusDp));
                  if (strokeDp > 0) d.setStroke(dp(strokeDp), strokeColor);
                  return d;
              }

              private LinearLayout.LayoutParams matchWrap(int bottomMarginDp) {
                  LinearLayout.LayoutParams lp = new LinearLayout.LayoutParams(
                          ViewGroup.LayoutParams.MATCH_PARENT,
                          ViewGroup.LayoutParams.WRAP_CONTENT
                  );
                  lp.bottomMargin = dp(bottomMarginDp);
                  return lp;
              }

              private void styleFilterButton(Button btn, boolean active) {
                  btn.setAllCaps(false);
                  btn.setTextSize(TypedValue.COMPLEX_UNIT_SP, 14);
                  btn.setPadding(dp(14), dp(10), dp(14), dp(10));
                  if (active) {
                      btn.setBackground(makeRounded(ACCENT, 18, 0, 0));
                      btn.setTextColor(Color.WHITE);
                  } else {
                      btn.setBackground(makeRounded(Color.WHITE, 18, BORDER, 2));
                      btn.setTextColor(TITLE);
                  }
              }

              private void updateFilterButtons(LinearLayout row) {
                  for (int i = 0; i < row.getChildCount(); i++) {
                      View child = row.getChildAt(i);
                      if (child instanceof Button) {
                          Button btn = (Button) child;
                          String t = btn.getText().toString();
                          boolean active = t.equals(currentSizeFilter) || (t.equals("Favoritter") && favoritesOnly);
                          styleFilterButton(btn, active);
                      }
                  }
              }

              private boolean isFavorite(String name) {
                  return prefs.getBoolean("fav_" + name, false);
              }

              private void toggleFavorite(String name) {
                  boolean current = isFavorite(name);
                  prefs.edit().putBoolean("fav_" + name, !current).apply();
              }

              private int dp(int value) {
                  float density = getResources().getDisplayMetrics().density;
                  return Math.round(value * density);
              }

